<title>ROANSA · RH Expedientes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Inter,sans-serif;background:#F3F4F6;color:#111;min-height:100vh}
:root{--red:#A31820;--red2:#C0112B;--red-light:#F9E5E8;--black:#111;--gray9:#1C1C1C;--gray7:#444;--gray4:#9CA3AF;--gray2:#E5E7EB;--gray1:#F3F4F6;--white:#fff}
#app{display:flex;min-height:100vh}
#sidebar{width:210px;min-width:210px;background:var(--black);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
#main{flex:1;padding:24px 28px;overflow-y:auto;min-height:100vh}
.logo-area{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.logo-box{width:34px;height:34px;background:var(--red2);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:16px;flex-shrink:0}
.logo-name{font-weight:900;font-size:13px;color:#fff}
.logo-sub{font-size:9px;color:var(--gray4);letter-spacing:1px;text-transform:uppercase}
nav{padding:14px 10px;display:flex;flex-direction:column;gap:2px;flex:1}
.nav-section{font-size:9px;font-weight:800;color:#333;letter-spacing:1.2px;text-transform:uppercase;padding:10px 11px 4px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:7px;border:none;background:transparent;color:var(--gray4);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;width:100%}
.nav-btn.active{background:rgba(192,17,43,.2);color:#ff6b7a}
.nav-btn:hover:not(.active){background:rgba(255,255,255,.05);color:#ccc}
.sidebar-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:#444}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.topbar h1{font-size:20px;font-weight:900;color:var(--black)}
.topbar-sub{font-size:11px;color:var(--gray4);margin-top:2px}
.btn{padding:8px 18px;border-radius:7px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s}
.btn:hover{opacity:.82}
.btn-primary{background:var(--red2);color:#fff}
.btn-secondary{background:#fff;color:var(--gray7);border:1.5px solid var(--gray2)}
.btn-ghost{background:transparent;color:var(--gray7);border:none}
.btn-danger{background:#fff;color:var(--red2);border:1.5px solid var(--red2)}
.btn-green{background:#166534;color:#fff}
.btn-drive{background:#1967D2;color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.badge{padding:2px 9px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;display:inline-block;white-space:nowrap}
.badge-green{background:#DCFCE7;color:#166534}
.badge-red{background:var(--red-light);color:var(--red2)}
.badge-yellow{background:#FEF9C3;color:#92400E}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
.badge-gray{background:var(--gray1);color:var(--gray7)}
.badge-drive{background:#E8F0FE;color:#1967D2}
.avatar{border-radius:50%;background:linear-gradient(135deg,var(--red2) 0%,var(--red) 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0}
/* Stats */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:16px 18px}
.stat-card.accent{border-left:4px solid var(--red2)}
.stat-val{font-size:28px;font-weight:900;line-height:1;color:var(--black)}
.stat-card.accent .stat-val{color:var(--red2)}
.stat-label{font-size:11px;font-weight:700;color:var(--gray7);margin-top:4px}
/* Alert */
.alert-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.alert-box{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:16px}
.alert-title{font-weight:800;font-size:13px;color:var(--black);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.alert-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray1)}
.alert-row:last-child{border-bottom:none}
/* Employees */
.emp-list{display:flex;flex-direction:column;gap:9px}
.emp-card{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:13px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border .15s,box-shadow .15s}
.emp-card:hover{border-color:var(--red2);box-shadow:0 2px 14px rgba(192,17,43,.1)}
.emp-name{font-weight:800;font-size:14px;color:var(--black)}
.emp-sub{font-size:11px;color:var(--gray4);margin-top:1px}
.emp-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.search-bar{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-bar input,.search-bar select{padding:8px 11px;border:1.5px solid var(--gray2);border-radius:7px;font-family:inherit;font-size:12px;color:var(--black);background:#fff;outline:none}
.search-bar input{flex:1;min-width:180px}
/* Detail */
.hero-card{background:linear-gradient(135deg,#111 0%,#1C1C1C 100%);border-radius:13px;padding:22px 26px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:16px}
.hero-name{font-size:20px;font-weight:900;color:#fff;line-height:1.1}
.hero-sub{font-size:12px;color:var(--gray4);margin-top:3px}
.hero-badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.section-box{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:16px 18px}
.section-title{font-size:10px;font-weight:800;color:var(--red2);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--gray1);padding-bottom:7px;margin-bottom:10px}
.data-row{display:grid;grid-template-columns:130px 1fr;gap:6px;align-items:start;margin-bottom:7px}
.data-label{font-size:11px;color:var(--gray4);font-weight:600}
.data-val{font-size:12px;color:var(--black);font-weight:600;word-break:break-all}
.alert-banner{background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:9px;padding:11px 15px;display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:#92400E}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;z-index:100;overflow-y:auto;padding:32px 12px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:720px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:17px;font-weight:900;color:var(--black)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray4)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:10px;font-weight:800;color:var(--gray7);letter-spacing:.4px;text-transform:uppercase}
.field input,.field select,.field textarea{padding:9px 12px;border:1.5px solid var(--gray2);border-radius:7px;font-family:inherit;font-size:13px;color:var(--black);background:#fff;outline:none;width:100%;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red2)}
.field textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--gray2)}
.fs-title{font-size:10px;font-weight:800;color:var(--red2);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--gray1)}
.doc-toggle{padding:6px 13px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;transition:all .1s;border:1.5px solid}
.doc-toggle.checked{background:#DCFCE7;color:#166534;border-color:#BBF7D0}
.doc-toggle.unchecked{background:var(--gray1);color:var(--gray7);border-color:var(--gray2)}
/* Steps */
.steps{display:flex;margin-bottom:22px;background:#fff;border:1.5px solid var(--gray2);border-radius:11px;overflow:hidden}
.step{flex:1;padding:13px 8px;text-align:center;border-right:1px solid var(--gray2);cursor:pointer;transition:background .15s}
.step:last-child{border-right:none}
.step.active{background:var(--red2);color:#fff}
.step.done{background:#DCFCE7;color:#166534}
.step-num{font-size:16px;font-weight:900;line-height:1}
.step-lbl{font-size:9px;font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.5px;opacity:.85}
/* Photo */
.photo-zone{border:2.5px dashed var(--gray2);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .15s;background:#fafafa}
.photo-zone:hover{border-color:var(--red2);background:var(--red-light)}
/* Documents upload */
.doc-upload-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;border:1.5px solid var(--gray2);background:#fff;margin-bottom:8px;transition:border .15s}
.doc-upload-row.has-file{border-color:#BBF7D0;background:#F0FDF4}
.doc-upload-row.uploading{border-color:#DBEAFE;background:#EFF6FF}
.doc-upload-row.error{border-color:#FECACA;background:#FEF2F2}
.doc-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.doc-name{font-size:12px;font-weight:700;color:var(--black);flex:1}
.doc-status{font-size:10px;color:var(--gray4);margin-top:1px}
.doc-upload-row.has-file .doc-name{color:#166534}
.doc-upload-row.uploading .doc-name{color:#1D4ED8}
.doc-upload-row.error .doc-name{color:var(--red2)}
/* Credencial - FRENTE */
.cred-pair{display:flex;gap:14px;flex-wrap:wrap}
.cred-front{width:240px;min-height:380px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.2);position:relative;display:flex;flex-direction:column}
.cf-top{background:#fff;padding:14px 14px 0;display:flex;align-items:center;gap:8px}
.cf-logo-diamond{width:32px;height:32px;flex-shrink:0}
.cf-logo-text{display:flex;flex-direction:column}
.cf-roansa{font-size:14px;font-weight:900;color:var(--red);letter-spacing:.5px}
.cf-seg{font-size:7px;color:#666;letter-spacing:1.5px;text-transform:uppercase;margin-top:-1px}
.cf-empresa{font-size:7px;color:#333;font-weight:700;text-align:center;padding:8px 14px 0;line-height:1.4;text-transform:uppercase}
.cf-photo-wrap{position:relative;margin:10px 14px 0;overflow:hidden}
.cf-photo{width:100%;height:160px;object-fit:cover;object-position:top;display:block;background:linear-gradient(135deg,#ddd,#bbb)}
.cf-photo-overlay{position:absolute;bottom:0;right:0;width:60%;height:100%;background:linear-gradient(to left, var(--red) 0%, transparent 100%);pointer-events:none}
.cf-name{background:#fff;text-align:center;padding:10px 10px 4px;font-size:13px;font-weight:900;color:#111;line-height:1.2;text-transform:uppercase}
.cf-bottom{background:var(--red);margin-top:auto;padding:12px;text-align:center}
.cf-puesto{color:#fff;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;line-height:1.3}
/* Credencial - REVERSO */
.cred-back{width:240px;min-height:380px;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.2);display:flex;flex-direction:column}
.cb-top{background:var(--red);padding:10px 14px;text-align:center}
.cb-folio{font-size:11px;font-weight:900;color:#fff;letter-spacing:.5px}
.cb-vigencia{font-size:10px;font-weight:700;color:rgba(255,255,255,.8);margin-top:1px}
.cb-body{background:#fff;flex:1;padding:18px 16px;display:flex;flex-direction:column;align-items:center}
.cb-sig-area{width:100%;height:80px;border-bottom:1.5px solid #ccc;margin-bottom:6px;display:flex;align-items:flex-end;justify-content:center}
.cb-sig-label{font-size:8px;color:#888;text-align:center;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.cb-coord{font-size:10px;font-weight:800;color:#111;text-align:center;text-transform:uppercase;line-height:1.4;margin-bottom:14px}
.cb-permiso{font-size:9px;color:#555;text-align:center;line-height:1.5}
.cb-exp{font-size:9px;color:#555;text-align:center;margin-top:2px}
.cb-bottom{background:var(--red);padding:10px 12px}
.cb-address{font-size:8px;color:rgba(255,255,255,.9);text-align:center;line-height:1.5}
/* Alta content */
.alta-content{background:#fff;border:1.5px solid var(--gray2);border-radius:12px;padding:24px}
/* Template */
.template-zone{border:2.5px dashed var(--gray2);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .15s}
.template-zone:hover{border-color:var(--red2);background:var(--red-light)}
.template-loaded{background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:10px}
.contract-preview{background:#fffef5;border:1px solid #e8e3c0;border-radius:8px;padding:18px 22px;font-size:11px;line-height:1.9;color:#333;max-height:300px;overflow-y:auto;white-space:pre-wrap;font-family:'Courier New',monospace;margin-top:12px}
.var-chip{display:inline-block;background:#EDE9FE;color:#6D28D9;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;font-family:monospace;margin:2px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.drive-badge{display:inline-flex;align-items:center;gap:4px;background:#E8F0FE;color:#1967D2;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700}
</style>
</head>

const calcAge=d=>{if(!d)return null;const t=new Date(),b=new Date(d);let a=t.getFullYear()-b.getFullYear();const m=t.getMonth()-b.getMonth();if(m<0||(m===0&&t.getDate()<b.getDate()))a--;return a;};
const calcYears=d=>{if(!d)return null;const t=new Date(),s=new Date(d);let y=t.getFullYear()-s.getFullYear();const m=t.getMonth()-s.getMonth();if(m<0||(m===0&&t.getDate()<s.getDate()))y--;return y;};
const daysUntil=d=>{if(!d)return null;const today=new Date();today.setHours(0,0,0,0);const dt=new Date(d);const next=new Date(today.getFullYear(),dt.getMonth(),dt.getDate());if(next<today)next.setFullYear(today.getFullYear()+1);return Math.ceil((next-today)/864e5);};
const fmtDate=d=>{if(!d)return'—';const[y,m,dd]=d.split('-');return`${parseInt(dd)} ${MESES_C[parseInt(m)-1]} ${y}`;};
const fmtDateLong=d=>{if(!d)return'—';const[y,m,dd]=d.split('-');return`${parseInt(dd)} de ${MESES[parseInt(m)-1]} de ${y}`;};
const todayStr=()=>new Date().toISOString().split('T')[0];
const thisYear=()=>new Date().getFullYear();
const initials=n=>n.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase();
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const gv=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
const docFalt=e=>DOCS.filter(d=>!e.documentos.includes(d));

function av(name,sz,foto){
  sz=sz||42;
  if(foto)return`<div class="avatar" style="width:${sz}px;height:${sz}px;overflow:hidden;border-radius:50%"><img src="${foto}" style="width:100%;height:100%;object-fit:cover"></div>`;
  return`<div class="avatar" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.36)}px">${initials(name)}</div>`;
}
function bdg(text,color){return`<span class="badge badge-${color||'gray'}">${text}</span>`;}

function fileToBase64(file){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});
}
function stripB64(dataUrl){return dataUrl.split(',')[1];}

// ── NAVEGACIÓN ────────────────────────────────────────────────────
function showView(v,id){
  currentView=v;if(id!=null)selectedId=id;

  const nb=document.getElementById('nav-'+(v==='detail'?'list':v));

// ── SUBIR DOCS A DRIVE ────────────────────────────────────────────
function openDocsModal(empId){
  const e=employees.find(x=>x.id===empId);
  if(!e)return;
  const rows=DOCS.map(doc=>{
    const driveFile=e.driveFiles&&e.driveFiles[doc];
    const tiene=e.documentos.includes(doc);
    return`<div class="doc-upload-row ${driveFile?'has-file':''}" id="drow-${empId}-${doc.replace(/\s+/g,'_')}">
      <div class="doc-icon">${driveFile?'✅':tiene?'📄':'📋'}</div>
      <div style="flex:1">
        <div class="doc-name">${doc}</div>
        <div class="doc-status">${driveFile?`<a href="${driveFile.url}" target="_blank" style="color:#1967D2;font-weight:700;text-decoration:none">📁 Ver en Drive</a>`:tiene?'Marcado como recibido — sin archivo en Drive':'Sin documento'}</div>
      </div>
      <div>
        <input type="file" id="file-${empId}-${doc.replace(/\s+/g,'_')}" accept="image/*,.pdf" style="display:none" onchange="uploadDocToDrive(${empId},'${doc}',this)">
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('file-${empId}-${doc.replace(/\s+/g,'_')}').click()">
          ${driveFile?'🔄 Reemplazar':'⬆️ Subir'}
        </button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('modal-inner').innerHTML=`
  <div class="modal-header"><div class="modal-title">📁 Expediente en Drive — ${esc(e.nombre)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div style="font-size:12px;color:var(--gray4);margin-bottom:16px">Los archivos se guardan en tu Google Drive en la carpeta <strong>ROANSA RH / ${esc(e.nombre)}</strong></div>
  <div id="docs-list-${empId}">${rows}</div>
  <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button><a href="${DRIVE_FOLDER_URL}" target="_blank" class="btn btn-drive btn-sm">📁 Abrir carpeta en Drive</a></div>`;
  document.getElementById('modal').style.display='flex';
}

async function uploadDocToDrive(empId, docName, input){
  const file=input.files[0];
  if(!file)return;
  const e=employees.find(x=>x.id===empId);
  if(!e)return;
  const safeDoc=docName.replace(/\s+/g,'_');
  const rowEl=document.getElementById(`drow-${empId}-${safeDoc}`);
  if(rowEl){rowEl.className='doc-upload-row uploading';rowEl.querySelector('.doc-name').textContent=docName;rowEl.querySelector('.doc-status').textContent='Subiendo a Drive…';}

  try{
    // Read file as base64
    const dataUrl=await fileToBase64(file);
    const b64=stripB64(dataUrl);
    
    // Get or create employee subfolder
    let folderId=e.folderId;
    if(!folderId){
      // We'll simulate creating folder by uploading with parent
      // In real usage this creates via Claude's Drive MCP
      folderId=DRIVE_FOLDER_ID; // fallback to main folder
    }

    // Build filename
    const ext=file.name.split('.').pop();
    const fileName=`${docName}_${e.nombre.replace(/\s+/g,'_')}.${ext}`;

    // Upload via Claude Drive MCP endpoint
    const resp=await fetch('https://drivemcp.googleapis.com/mcp/v1',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        method:'tools/call',
        params:{
          name:'create_file',
          arguments:{title:fileName,base64Content:b64,contentMimeType:file.type,parentId:folderId,disableConversionToGoogleType:true}
        }
      })
    });

    // Since direct MCP calls from browser have auth issues,
    // we store the file data locally and show instructions
    throw new Error('BROWSER_CORS');

  }catch(err){
    // Fallback: store file locally in app and show Drive upload instructions
    const dataUrl=await fileToBase64(file);
    
    // Store in employee record
    if(!e.driveFiles)e.driveFiles={};
    e.driveFiles[docName]={url:'local',name:file.name,localData:dataUrl,needsUpload:true};
    if(!e.documentos.includes(docName))e.documentos.push(docName);

    if(rowEl){
      rowEl.className='doc-upload-row has-file';
      rowEl.querySelector('.doc-icon').textContent='✅';
      rowEl.querySelector('.doc-name').textContent=docName;
      rowEl.querySelector('.doc-status').innerHTML=`<span style="color:#166534;font-weight:700">✓ Archivo guardado en la app</span> · <span style="color:#92400E">Sube manualmente a Drive</span>`;
    }
    
    // Show instruction
    showDriveInstructions(e, docName, dataUrl, file.name);
  }
}

function showDriveInstructions(e, docName, dataUrl, fileName){
  // Create download link so user can easily upload to Drive
  const a=document.createElement('a');
  a.href=dataUrl;
  a.download=`${docName}_${e.nombre.replace(/\s+/g,'_')}_${fileName}`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  
  // Show a toast
  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:24px;right:24px;background:#1C1C1C;color:#fff;padding:14px 18px;border-radius:10px;font-size:12px;z-index:999;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.3)';
  toast.innerHTML=`<div style="font-weight:800;margin-bottom:4px">✅ Archivo descargado</div><div style="color:#aaa;line-height:1.5">Se descargó <strong>${fileName}</strong>. Súbelo a tu carpeta <strong>ROANSA RH</strong> en Drive para tenerlo sincronizado.</div><div style="margin-top:8px"><a href="${DRIVE_FOLDER_URL}" target="_blank" style="color:#60a5fa;font-weight:700;text-decoration:none">Abrir carpeta en Drive →</a></div>`;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),8000);
}

function renderAltaStep2(){
  const d=altaData;
  const rows=DOCS.map(doc=>{

    const checked=(d.documentos||[]).includes(doc);
    return`<div class="doc-upload-row ${file?'has-file':''}" id="alta-drow-${safeDoc}">
      <div class="doc-icon">${file?'✅':'📋'}</div>
      <div style="flex:1">
        <div class="doc-name">${doc}</div>
        <div class="doc-status">${file?`<span style="color:#166534">${file.name}</span>`:'Sin archivo'}</div>

        ${!checked?`<button class="btn btn-ghost btn-sm" onclick="markAltaDoc('${doc}')" title="Solo marcar como recibido sin archivo">✓</button>`:'<span style="color:#166534;font-size:11px;font-weight:700">✓</span>'}

  }).join('');

  return`<div class="alta-content">

  <p style="font-size:12px;color:var(--gray4);margin-bottom:14px">Sube el archivo de cada documento o márcalos como recibidos. Los archivos se guardarán en Drive al completar el alta.</p>

  </div>
  <div style="display:flex;justify-content:space-between">
    <button class="btn btn-secondary" onclick="altaStep=1;renderAlta()">← Regresar</button>
    <button class="btn btn-primary" onclick="altaGuardarPaso2()">Continuar → Generar documentos</button>
  </div></div>`;
}

function handleAltaDocFile(docName,input){
  const file=input.files[0];
  if(!file)return;
  if(!altaData.docFiles)altaData.docFiles={};
  altaData.docFiles[docName]=file;
  if(!altaData.documentos.includes(docName))altaData.documentos.push(docName);
  const safeDoc=docName.replace(/\s+/g,'_');
  const row=document.getElementById('alta-drow-'+safeDoc);
  if(row){row.className='doc-upload-row has-file';row.querySelector('.doc-icon').textContent='✅';row.querySelector('.doc-name').textContent=docName;row.querySelector('.doc-status').innerHTML=`<span style="color:#166534">${file.name}</span>`;}
}

function markAltaDoc(docName){
  if(!altaData.documentos.includes(docName))altaData.documentos.push(docName);
  const safeDoc=docName.replace(/\s+/g,'_');
  const row=document.getElementById('alta-drow-'+safeDoc);
  if(row){row.className='doc-upload-row has-file';row.querySelector('.doc-icon').textContent='✅';row.querySelector('.doc-status').textContent='Marcado como recibido';}
}

function handleFotoAlta(event){
  const file=event.target.files[0];if(!file)return;

function altaGuardarPaso1(){
  const nombre=gv('a-nombre');if(!nombre){alert('El nombre es requerido.');return;}
  const puesto=gv('a-puesto'),area=gv('a-area'),ing=gv('a-ing');
  if(!puesto||!area){alert('El puesto y área son requeridos.');return;}
  if(!ing){alert('La fecha de ingreso es requerida.');return;}
  altaData={...altaData,nombre,puesto,area,fechaNacimiento:gv('a-nac'),curp:gv('a-curp'),rfc:gv('a-rfc'),nss:gv('a-nss'),telefono:gv('a-tel'),email:gv('a-email'),domicilio:gv('a-dom'),fechaIngreso:ing,contrato:gv('a-contrato')||'Tiempo Indeterminado',status:gv('a-status')||'Activo',notas:gv('a-notas')};
  altaStep=2;renderAlta();
}

async function altaGuardarPaso2(){
  const docs=[...document.querySelectorAll('[id^="alta-drow-"]')].filter(r=>r.classList.contains('has-file')).map(r=>r.querySelector('.doc-name').textContent);
  altaData.documentos=docs;
  const newEmp={...altaData,id:Date.now(),documentos:docs,driveFiles:{},folderId:null};
  delete newEmp._saved;delete newEmp.docFiles;
  employees.push(newEmp);
  altaData._saved=newEmp;

  // Download any uploaded files so user can put them in Drive
  if(altaData.docFiles){
    for(const[doc,file] of Object.entries(altaData.docFiles)){
      const dataUrl=await fileToBase64(file);
      const ext=file.name.split('.').pop();
      const a=document.createElement('a');
      a.href=dataUrl;
      a.download=`${doc}_${newEmp.nombre.replace(/\s+/g,'_')}.${ext}`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      await new Promise(r=>setTimeout(r,400));
    }
  }
  updateSidebar();
  altaStep=3;renderAlta();
}

// ── CONTRATO ──────────────────────────────────────────────────────
function generateContract(id){
  const e=employees.find(x=>x.id===id);if(!e||!contractTemplate){alert('Sin machote cargado.');return;}
  const filled=contractTemplate.replace(/\{\{nombre\}\}/g,e.nombre||'').replace(/\{\{curp\}\}/g,e.curp||'').replace(/\{\{rfc\}\}/g,e.rfc||'').replace(/\{\{nss\}\}/g,e.nss||'').replace(/\{\{puesto\}\}/g,e.puesto||'').replace(/\{\{area\}\}/g,e.area||'').replace(/\{\{contrato\}\}/g,e.contrato||'').replace(/\{\{fecha_ingreso\}\}/g,fmtDateLong(e.fechaIngreso)).replace(/\{\{domicilio\}\}/g,e.domicilio||'').replace(/\{\{telefono\}\}/g,e.telefono||'').replace(/\{\{email\}\}/g,e.email||'');
  const blob=new Blob([filled],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='Contrato_'+e.nombre.replace(/\s+/g,'_')+'.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

  h+=`</div>`;

}
async function handleContractFile(e){const f=e.target.files[0];if(!f)return;contractTemplate=await f.text();renderTemplates();}
async function handleContractDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(!f)return;contractTemplate=await f.text();renderTemplates();}
function loadSampleContract(){
  contractTemplate=`CONTRATO INDIVIDUAL DE TRABAJO\n\nEn la Ciudad de México, a {{fecha_ingreso}}, comparecen:\n\nPATRÓN: ROANSA SEGURIDAD PRIVADA S.A. DE C.V., representada por su Directora General.\n\nTRABAJADOR: {{nombre}}, con CURP {{curp}}, RFC {{rfc}}, NSS {{nss}}, con domicilio en {{domicilio}}, teléfono {{telefono}}.\n\nCLÁUSULAS:\n\nPRIMERA. El TRABAJADOR se obliga a prestar sus servicios como {{puesto}} en el área de {{area}}.\n\nSEGUNDA. La duración del contrato es de tipo {{contrato}}, con inicio {{fecha_ingreso}}.\n\nTERCERA. El TRABAJADOR se compromete a cumplir con los reglamentos y normas de ROANSA Seguridad Privada.\n\n\n_________________________________     _________________________________\n   ROANSA SEGURIDAD PRIVADA                    {{nombre}}\n       Directora General                         Trabajador(a)`;
  renderTemplates();
}

// ── MODAL EDICIÓN ─────────────────────────────────────────────────
function openEditModal(id){
  editingId=id;
  const e=employees.find(x=>x.id===id)||{};
  const docBtns=DOCS.map(d=>{const c=e.documentos&&e.documentos.includes(d);return`<button type="button" class="doc-toggle ${c?'checked':'unchecked'}" data-doc="${d}" onclick="toggleDoc(this,'${d}')">${c?'✓':'○'} ${d}</button>`;}).join('');
  document.getElementById('modal-inner').innerHTML=`
  <div class="modal-header"><div class="modal-title">✏️ Editar — ${esc(e.nombre)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="fs-title">Datos personales</div>
  <div class="form-grid" style="gap:9px;margin-bottom:14px">
    <div class="field" style="grid-column:1/-1"><label class="field-label">Nombre *</label><input id="f-nombre" value="${esc(e.nombre)}"></div>
    <div class="field"><label class="field-label">Fecha nacimiento</label><input id="f-nac" type="date" value="${esc(e.fechaNacimiento)}"></div>
    <div class="field"><label class="field-label">Teléfono</label><input id="f-tel" value="${esc(e.telefono)}"></div>
    <div class="field"><label class="field-label">CURP</label><input id="f-curp" value="${esc(e.curp)}"></div>
    <div class="field"><label class="field-label">RFC</label><input id="f-rfc" value="${esc(e.rfc)}"></div>
    <div class="field"><label class="field-label">NSS</label><input id="f-nss" value="${esc(e.nss)}"></div>
    <div class="field"><label class="field-label">Correo</label><input id="f-email" type="email" value="${esc(e.email)}"></div>
    <div class="field" style="grid-column:1/-1"><label class="field-label">Domicilio</label><input id="f-dom" value="${esc(e.domicilio||'')}"></div>
  </div>
  <div class="fs-title">Datos laborales</div>
  <div class="form-grid" style="gap:9px;margin-bottom:14px">
    <div class="field"><label class="field-label">Puesto</label><select id="f-puesto"><option value="">—</option>${PUESTOS.map(p=>`<option${e.puesto===p?' selected':''}>${p}</option>`).join('')}</select></div>
    <div class="field"><label class="field-label">Área</label><select id="f-area"><option value="">—</option>${AREAS.map(a=>`<option${e.area===a?' selected':''}>${a}</option>`).join('')}</select></div>
    <div class="field"><label class="field-label">Fecha ingreso</label><input id="f-ing" type="date" value="${esc(e.fechaIngreso)}"></div>
    <div class="field"><label class="field-label">Status</label><select id="f-status"><option${e.status==='Activo'?' selected':''}>Activo</option><option${e.status==='Inactivo'?' selected':''}>Inactivo</option><option${e.status==='Baja'?' selected':''}>Baja</option></select></div>
    <div class="field" style="grid-column:1/-1"><label class="field-label">Contrato</label><select id="f-contrato"><option value="">—</option>${CONTRATOS.map(c=>`<option${e.contrato===c?' selected':''}>${c}</option>`).join('')}</select></div>
  </div>
  <div class="fs-title">Documentos</div>
  <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px" id="doc-btns">${docBtns}</div>
  <div class="field"><label class="field-label">Notas</label><textarea id="f-notas" rows="2">${esc(e.notas)}</textarea></div>
  <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveEdit()">💾 Guardar</button></div>`;
  document.getElementById('modal').style.display='flex';
}
function toggleDoc(btn,doc){const c=btn.classList.contains('checked');btn.classList.toggle('checked',!c);btn.classList.toggle('unchecked',c);btn.textContent=(c?'○':'✓')+' '+doc;}
function saveEdit(){
  const nombre=gv('f-nombre');if(!nombre){alert('Nombre requerido.');return;}
  const docs=[...document.querySelectorAll('#doc-btns .doc-toggle.checked')].map(b=>b.dataset.doc);
  const i=employees.findIndex(e=>e.id===editingId);
  if(i>-1)employees[i]={...employees[i],nombre,puesto:gv('f-puesto'),area:gv('f-area'),telefono:gv('f-tel'),email:gv('f-email'),curp:gv('f-curp'),rfc:gv('f-rfc'),nss:gv('f-nss'),domicilio:gv('f-dom'),fechaNacimiento:gv('f-nac'),fechaIngreso:gv('f-ing'),status:gv('f-status'),contrato:gv('f-contrato'),notas:gv('f-notas'),documentos:docs};
  closeModal();renderDetail();updateSidebar();
}
function deleteEmp(id){const e=employees.find(x=>x.id===id);if(!confirm(`¿Eliminar expediente de ${e.nombre}?`))return;employees=employees.filter(x=>x.id!==id);showView('list');}
function closeModal(){document.getElementById('modal').style.display='none';}

showView('dashboard');
</script>

            style="width:100%;padding:12px 16px;border-radius:8px;border:1.5px solid #333;background:#111;color:#fff;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px;box-sizing:border-box;text-align:center;letter-spacing:2px"
            onkeydown="if(event.key==='Enter')checkPwd()">
          <button onclick="checkPwd()"
            style="width:100%;padding:12px;background:#C0112B;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:12px">
            Entrar
          </button>
          <div id="pwd-error" style="color:#ff6b7a;font-size:12px;font-weight:700;min-height:18px"></div>
        </div>`;
      document.getElementById('pwd-input').focus();
    });
    window.checkPwd = function(){
      var val = document.getElementById('pwd-input').value;
      if(val === PASSWORD){
        sessionStorage.setItem(SESSION_KEY, 'ok');
        location.reload();
      } else {
        var err = document.getElementById('pwd-error');
        err.textContent = 'Contraseña incorrecta';
        document.getElementById('pwd-input').value = '';
        document.getElementById('pwd-input').focus();
        setTimeout(function(){err.textContent='';}, 2500);
      }
    };
  }
})();
</script>

const calcAge=d=>{if(!d)return null;const t=new Date(),b=new Date(d);let a=t.getFullYear()-b.getFullYear();const m=t.getMonth()-b.getMonth();if(m<0||(m===0&&t.getDate()<b.getDate()))a--;return a;};
const calcYears=d=>{if(!d)return null;const t=new Date(),s=new Date(d);let y=t.getFullYear()-s.getFullYear();const m=t.getMonth()-s.getMonth();if(m<0||(m===0&&t.getDate()<s.getDate()))y--;return y;};
const daysUntil=d=>{if(!d)return null;const today=new Date();today.setHours(0,0,0,0);const dt=new Date(d);const next=new Date(today.getFullYear(),dt.getMonth(),dt.getDate());if(next<today)next.setFullYear(today.getFullYear()+1);return Math.ceil((next-today)/864e5);};
const fmtDate=d=>{if(!d)return'—';const[y,m,dd]=d.split('-');return`${parseInt(dd)} ${MESES_C[parseInt(m)-1]} ${y}`;};
const fmtDateLong=d=>{if(!d)return'—';const[y,m,dd]=d.split('-');return`${parseInt(dd)} de ${MESES[parseInt(m)-1]} de ${y}`;};
const todayStr=()=>new Date().toISOString().split('T')[0];
const thisYear=()=>new Date().getFullYear();
const initials=n=>n.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase();
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const gv=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
const docFalt=e=>DOCS.filter(d=>!e.documentos.includes(d));

function av(name,sz,foto){
  sz=sz||42;
  if(foto)return`<div class="avatar" style="width:${sz}px;height:${sz}px;overflow:hidden;border-radius:50%"><img src="${foto}" style="width:100%;height:100%;object-fit:cover"></div>`;
  return`<div class="avatar" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.36)}px">${initials(name)}</div>`;
}
function bdg(text,color){return`<span class="badge badge-${color||'gray'}">${text}</span>`;}

function fileToBase64(file){
  return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file);});
}
function stripB64(dataUrl){return dataUrl.split(',')[1];}

// ── NAVEGACIÓN ────────────────────────────────────────────────────
function showView(v,id){
  currentView=v;if(id!=null)selectedId=id;

  const nb=document.getElementById('nav-'+(v==='detail'?'list':v));

// ── SUBIR DOCS A DRIVE ────────────────────────────────────────────
function openDocsModal(empId){
  const e=employees.find(x=>x.id===empId);
  if(!e)return;
  const rows=DOCS.map(doc=>{
    const driveFile=e.driveFiles&&e.driveFiles[doc];
    const tiene=e.documentos.includes(doc);
    return`<div class="doc-upload-row ${driveFile?'has-file':''}" id="drow-${empId}-${doc.replace(/\s+/g,'_')}">
      <div class="doc-icon">${driveFile?'✅':tiene?'📄':'📋'}</div>
      <div style="flex:1">
        <div class="doc-name">${doc}</div>
        <div class="doc-status">${driveFile?`<a href="${driveFile.url}" target="_blank" style="color:#1967D2;font-weight:700;text-decoration:none">📁 Ver en Drive</a>`:tiene?'Marcado como recibido — sin archivo en Drive':'Sin documento'}</div>
      </div>
      <div>
        <input type="file" id="file-${empId}-${doc.replace(/\s+/g,'_')}" accept="image/*,.pdf" style="display:none" onchange="uploadDocToDrive(${empId},'${doc}',this)">
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('file-${empId}-${doc.replace(/\s+/g,'_')}').click()">
          ${driveFile?'🔄 Reemplazar':'⬆️ Subir'}
        </button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('modal-inner').innerHTML=`
  <div class="modal-header"><div class="modal-title">📁 Expediente en Drive — ${esc(e.nombre)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div style="font-size:12px;color:var(--gray4);margin-bottom:16px">Los archivos se guardan en tu Google Drive en la carpeta <strong>ROANSA RH / ${esc(e.nombre)}</strong></div>
  <div id="docs-list-${empId}">${rows}</div>
  <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button><a href="${DRIVE_FOLDER_URL}" target="_blank" class="btn btn-drive btn-sm">📁 Abrir carpeta en Drive</a></div>`;
  document.getElementById('modal').style.display='flex';
}

async function uploadDocToDrive(empId, docName, input){
  const file=input.files[0];
  if(!file)return;
  const e=employees.find(x=>x.id===empId);
  if(!e)return;
  const safeDoc=docName.replace(/\s+/g,'_');
  const rowEl=document.getElementById(`drow-${empId}-${safeDoc}`);
  if(rowEl){rowEl.className='doc-upload-row uploading';rowEl.querySelector('.doc-name').textContent=docName;rowEl.querySelector('.doc-status').textContent='Subiendo a Drive…';}

  try{
    // Read file as base64
    const dataUrl=await fileToBase64(file);
    const b64=stripB64(dataUrl);
    
    // Get or create employee subfolder
    let folderId=e.folderId;
    if(!folderId){
      // We'll simulate creating folder by uploading with parent
      // In real usage this creates via Claude's Drive MCP
      folderId=DRIVE_FOLDER_ID; // fallback to main folder
    }

    // Build filename
    const ext=file.name.split('.').pop();
    const fileName=`${docName}_${e.nombre.replace(/\s+/g,'_')}.${ext}`;

    // Upload via Claude Drive MCP endpoint
    const resp=await fetch('https://drivemcp.googleapis.com/mcp/v1',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        method:'tools/call',
        params:{
          name:'create_file',
          arguments:{title:fileName,base64Content:b64,contentMimeType:file.type,parentId:folderId,disableConversionToGoogleType:true}
        }
      })
    });

    // Since direct MCP calls from browser have auth issues,
    // we store the file data locally and show instructions
    throw new Error('BROWSER_CORS');

  }catch(err){
    // Fallback: store file locally in app and show Drive upload instructions
    const dataUrl=await fileToBase64(file);
    
    // Store in employee record
    if(!e.driveFiles)e.driveFiles={};
    e.driveFiles[docName]={url:'local',name:file.name,localData:dataUrl,needsUpload:true};
    if(!e.documentos.includes(docName))e.documentos.push(docName);

    if(rowEl){
      rowEl.className='doc-upload-row has-file';
      rowEl.querySelector('.doc-icon').textContent='✅';
      rowEl.querySelector('.doc-name').textContent=docName;
      rowEl.querySelector('.doc-status').innerHTML=`<span style="color:#166534;font-weight:700">✓ Archivo guardado en la app</span> · <span style="color:#92400E">Sube manualmente a Drive</span>`;
    }
    
    // Show instruction
    showDriveInstructions(e, docName, dataUrl, file.name);
  }
}

function showDriveInstructions(e, docName, dataUrl, fileName){
  // Create download link so user can easily upload to Drive
  const a=document.createElement('a');
  a.href=dataUrl;
  a.download=`${docName}_${e.nombre.replace(/\s+/g,'_')}_${fileName}`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  
  // Show a toast
  const toast=document.createElement('div');
  toast.style.cssText='position:fixed;bottom:24px;right:24px;background:#1C1C1C;color:#fff;padding:14px 18px;border-radius:10px;font-size:12px;z-index:999;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.3)';
  toast.innerHTML=`<div style="font-weight:800;margin-bottom:4px">✅ Archivo descargado</div><div style="color:#aaa;line-height:1.5">Se descargó <strong>${fileName}</strong>. Súbelo a tu carpeta <strong>ROANSA RH</strong> en Drive para tenerlo sincronizado.</div><div style="margin-top:8px"><a href="${DRIVE_FOLDER_URL}" target="_blank" style="color:#60a5fa;font-weight:700;text-decoration:none">Abrir carpeta en Drive →</a></div>`;
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(),8000);
}

function renderAltaStep2(){
  const d=altaData;
  const rows=DOCS.map(doc=>{

    const checked=(d.documentos||[]).includes(doc);
    return`<div class="doc-upload-row ${file?'has-file':''}" id="alta-drow-${safeDoc}">
      <div class="doc-icon">${file?'✅':'📋'}</div>
      <div style="flex:1">
        <div class="doc-name">${doc}</div>
        <div class="doc-status">${file?`<span style="color:#166534">${file.name}</span>`:'Sin archivo'}</div>

        ${!checked?`<button class="btn btn-ghost btn-sm" onclick="markAltaDoc('${doc}')" title="Solo marcar como recibido sin archivo">✓</button>`:'<span style="color:#166534;font-size:11px;font-weight:700">✓</span>'}

  }).join('');

  return`<div class="alta-content">

  <p style="font-size:12px;color:var(--gray4);margin-bottom:14px">Sube el archivo de cada documento o márcalos como recibidos. Los archivos se guardarán en Drive al completar el alta.</p>

  </div>
  <div style="display:flex;justify-content:space-between">
    <button class="btn btn-secondary" onclick="altaStep=1;renderAlta()">← Regresar</button>
    <button class="btn btn-primary" onclick="altaGuardarPaso2()">Continuar → Generar documentos</button>
  </div></div>`;
}

function handleAltaDocFile(docName,input){
  const file=input.files[0];
  if(!file)return;
  if(!altaData.docFiles)altaData.docFiles={};
  altaData.docFiles[docName]=file;
  if(!altaData.documentos.includes(docName))altaData.documentos.push(docName);
  const safeDoc=docName.replace(/\s+/g,'_');
  const row=document.getElementById('alta-drow-'+safeDoc);
  if(row){row.className='doc-upload-row has-file';row.querySelector('.doc-icon').textContent='✅';row.querySelector('.doc-name').textContent=docName;row.querySelector('.doc-status').innerHTML=`<span style="color:#166534">${file.name}</span>`;}
}

function markAltaDoc(docName){
  if(!altaData.documentos.includes(docName))altaData.documentos.push(docName);
  const safeDoc=docName.replace(/\s+/g,'_');
  const row=document.getElementById('alta-drow-'+safeDoc);
  if(row){row.className='doc-upload-row has-file';row.querySelector('.doc-icon').textContent='✅';row.querySelector('.doc-status').textContent='Marcado como recibido';}
}

function handleFotoAlta(event){
  const file=event.target.files[0];if(!file)return;

function altaGuardarPaso1(){
  const nombre=gv('a-nombre');if(!nombre){alert('El nombre es requerido.');return;}
  const puesto=gv('a-puesto'),area=gv('a-area'),ing=gv('a-ing');
  if(!puesto||!area){alert('El puesto y área son requeridos.');return;}
  if(!ing){alert('La fecha de ingreso es requerida.');return;}
  altaData={...altaData,nombre,puesto,area,fechaNacimiento:gv('a-nac'),curp:gv('a-curp'),rfc:gv('a-rfc'),nss:gv('a-nss'),telefono:gv('a-tel'),email:gv('a-email'),domicilio:gv('a-dom'),fechaIngreso:ing,contrato:gv('a-contrato')||'Tiempo Indeterminado',status:gv('a-status')||'Activo',notas:gv('a-notas')};
  altaStep=2;renderAlta();
}

async function altaGuardarPaso2(){
  const docs=[...document.querySelectorAll('[id^="alta-drow-"]')].filter(r=>r.classList.contains('has-file')).map(r=>r.querySelector('.doc-name').textContent);
  altaData.documentos=docs;
  const newEmp={...altaData,id:Date.now(),documentos:docs,driveFiles:{},folderId:null};
  delete newEmp._saved;delete newEmp.docFiles;
  employees.push(newEmp);
  altaData._saved=newEmp;

  // Download any uploaded files so user can put them in Drive
  if(altaData.docFiles){
    for(const[doc,file] of Object.entries(altaData.docFiles)){
      const dataUrl=await fileToBase64(file);
      const ext=file.name.split('.').pop();
      const a=document.createElement('a');
      a.href=dataUrl;
      a.download=`${doc}_${newEmp.nombre.replace(/\s+/g,'_')}.${ext}`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      await new Promise(r=>setTimeout(r,400));
    }
  }
  updateSidebar();
  altaStep=3;renderAlta();
}

// ── CONTRATO ──────────────────────────────────────────────────────
function generateContract(id){
  const e=employees.find(x=>x.id===id);if(!e||!contractTemplate){alert('Sin machote cargado.');return;}
  const filled=contractTemplate.replace(/\{\{nombre\}\}/g,e.nombre||'').replace(/\{\{curp\}\}/g,e.curp||'').replace(/\{\{rfc\}\}/g,e.rfc||'').replace(/\{\{nss\}\}/g,e.nss||'').replace(/\{\{puesto\}\}/g,e.puesto||'').replace(/\{\{area\}\}/g,e.area||'').replace(/\{\{contrato\}\}/g,e.contrato||'').replace(/\{\{fecha_ingreso\}\}/g,fmtDateLong(e.fechaIngreso)).replace(/\{\{domicilio\}\}/g,e.domicilio||'').replace(/\{\{telefono\}\}/g,e.telefono||'').replace(/\{\{email\}\}/g,e.email||'');
  const blob=new Blob([filled],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='Contrato_'+e.nombre.replace(/\s+/g,'_')+'.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

  h+=`</div>`;

}
async function handleContractFile(e){const f=e.target.files[0];if(!f)return;contractTemplate=await f.text();renderTemplates();}
async function handleContractDrop(e){e.preventDefault();const f=e.dataTransfer.files[0];if(!f)return;contractTemplate=await f.text();renderTemplates();}
function loadSampleContract(){
  contractTemplate=`CONTRATO INDIVIDUAL DE TRABAJO\n\nEn la Ciudad de México, a {{fecha_ingreso}}, comparecen:\n\nPATRÓN: ROANSA SEGURIDAD PRIVADA S.A. DE C.V., representada por su Directora General.\n\nTRABAJADOR: {{nombre}}, con CURP {{curp}}, RFC {{rfc}}, NSS {{nss}}, con domicilio en {{domicilio}}, teléfono {{telefono}}.\n\nCLÁUSULAS:\n\nPRIMERA. El TRABAJADOR se obliga a prestar sus servicios como {{puesto}} en el área de {{area}}.\n\nSEGUNDA. La duración del contrato es de tipo {{contrato}}, con inicio {{fecha_ingreso}}.\n\nTERCERA. El TRABAJADOR se compromete a cumplir con los reglamentos y normas de ROANSA Seguridad Privada.\n\n\n_________________________________     _________________________________\n   ROANSA SEGURIDAD PRIVADA                    {{nombre}}\n       Directora General                         Trabajador(a)`;
  renderTemplates();
}

// ── MODAL EDICIÓN ─────────────────────────────────────────────────
function openEditModal(id){
  editingId=id;
  const e=employees.find(x=>x.id===id)||{};
  const docBtns=DOCS.map(d=>{const c=e.documentos&&e.documentos.includes(d);return`<button type="button" class="doc-toggle ${c?'checked':'unchecked'}" data-doc="${d}" onclick="toggleDoc(this,'${d}')">${c?'✓':'○'} ${d}</button>`;}).join('');
  document.getElementById('modal-inner').innerHTML=`
  <div class="modal-header"><div class="modal-title">✏️ Editar — ${esc(e.nombre)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="fs-title">Datos personales</div>
  <div class="form-grid" style="gap:9px;margin-bottom:14px">
    <div class="field" style="grid-column:1/-1"><label class="field-label">Nombre *</label><input id="f-nombre" value="${esc(e.nombre)}"></div>
    <div class="field"><label class="field-label">Fecha nacimiento</label><input id="f-nac" type="date" value="${esc(e.fechaNacimiento)}"></div>
    <div class="field"><label class="field-label">Teléfono</label><input id="f-tel" value="${esc(e.telefono)}"></div>
    <div class="field"><label class="field-label">CURP</label><input id="f-curp" value="${esc(e.curp)}"></div>
    <div class="field"><label class="field-label">RFC</label><input id="f-rfc" value="${esc(e.rfc)}"></div>
    <div class="field"><label class="field-label">NSS</label><input id="f-nss" value="${esc(e.nss)}"></div>
    <div class="field"><label class="field-label">Correo</label><input id="f-email" type="email" value="${esc(e.email)}"></div>
    <div class="field" style="grid-column:1/-1"><label class="field-label">Domicilio</label><input id="f-dom" value="${esc(e.domicilio||'')}"></div>
  </div>
  <div class="fs-title">Datos laborales</div>
  <div class="form-grid" style="gap:9px;margin-bottom:14px">
    <div class="field"><label class="field-label">Puesto</label><select id="f-puesto"><option value="">—</option>${PUESTOS.map(p=>`<option${e.puesto===p?' selected':''}>${p}</option>`).join('')}</select></div>
    <div class="field"><label class="field-label">Área</label><select id="f-area"><option value="">—</option>${AREAS.map(a=>`<option${e.area===a?' selected':''}>${a}</option>`).join('')}</select></div>
    <div class="field"><label class="field-label">Fecha ingreso</label><input id="f-ing" type="date" value="${esc(e.fechaIngreso)}"></div>
    <div class="field"><label class="field-label">Status</label><select id="f-status"><option${e.status==='Activo'?' selected':''}>Activo</option><option${e.status==='Inactivo'?' selected':''}>Inactivo</option><option${e.status==='Baja'?' selected':''}>Baja</option></select></div>
    <div class="field" style="grid-column:1/-1"><label class="field-label">Contrato</label><select id="f-contrato"><option value="">—</option>${CONTRATOS.map(c=>`<option${e.contrato===c?' selected':''}>${c}</option>`).join('')}</select></div>
  </div>
  <div class="fs-title">Documentos</div>
  <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px" id="doc-btns">${docBtns}</div>
  <div class="field"><label class="field-label">Notas</label><textarea id="f-notas" rows="2">${esc(e.notas)}</textarea></div>
  <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveEdit()">💾 Guardar</button></div>`;
  document.getElementById('modal').style.display='flex';
}
function toggleDoc(btn,doc){const c=btn.classList.contains('checked');btn.classList.toggle('checked',!c);btn.classList.toggle('unchecked',c);btn.textContent=(c?'○':'✓')+' '+doc;}
function saveEdit(){
  const nombre=gv('f-nombre');if(!nombre){alert('Nombre requerido.');return;}
  const docs=[...document.querySelectorAll('#doc-btns .doc-toggle.checked')].map(b=>b.dataset.doc);
  const i=employees.findIndex(e=>e.id===editingId);
  if(i>-1)employees[i]={...employees[i],nombre,puesto:gv('f-puesto'),area:gv('f-area'),telefono:gv('f-tel'),email:gv('f-email'),curp:gv('f-curp'),rfc:gv('f-rfc'),nss:gv('f-nss'),domicilio:gv('f-dom'),fechaNacimiento:gv('f-nac'),fechaIngreso:gv('f-ing'),status:gv('f-status'),contrato:gv('f-contrato'),notas:gv('f-notas'),documentos:docs};
  closeModal();renderDetail();updateSidebar();
}
function deleteEmp(id){const e=employees.find(x=>x.id===id);if(!confirm(`¿Eliminar expediente de ${e.nombre}?`))return;employees=employees.filter(x=>x.id!==id);showView('list');}
function closeModal(){document.getElementById('modal').style.display='none';}

showView('dashboard');
</script>
</body>
