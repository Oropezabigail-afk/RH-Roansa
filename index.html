function du(d){if(!d)return null;var td=new Date();td.setHours(0,0,0,0);var dt=new Date(d),nx=new Date(td.getFullYear(),dt.getMonth(),dt.getDate());if(nx<td)nx.setFullYear(td.getFullYear()+1);return Math.ceil((nx-td)/864e5);}
function fd(d){if(!d)return'--';var p=d.split('-');return parseInt(p[2])+' '+MESC[parseInt(p[1])-1]+' '+p[0];}
function fdl(d){if(!d)return'--';var p=d.split('-');return parseInt(p[2])+' de '+MESES[parseInt(p[1])-1]+' de '+p[0];}
function td(){return new Date().toISOString().split('T')[0];}
function ini(n){return n.split(' ').slice(0,2).map(function(x){return x[0];}).join('').toUpperCase();}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function gv(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function df(emp){return DOCS.filter(function(d){return emp.docs.indexOf(d)<0;});}
function av(nm,sz,foto){sz=sz||42;if(foto)return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;overflow:hidden;border-radius:50%"><img src="'+foto+'" style="width:100%;height:100%;object-fit:cover"></div>';return '<div class="av" style="width:'+sz+'px;height:'+sz+'px;font-size:'+Math.round(sz*.36)+'px">'+ini(nm)+'</div>';}
function bdg(t,c){return '<span class="bdg '+c+'">'+t+'</span>';}
function ebdg(emp){return bdg(emp||'ROANSA',emp==='SPG'?'dspg':'droansa');}

function V(v,id){
  curView=v;if(id!=null)selId=id;
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  var nb=document.getElementById('nb-'+(v==='detail'?'list':v));
  if(nb)nb.classList.add('on');
  ['vd','vl','vdt','va','vt'].forEach(function(x){document.getElementById(x).style.display='none';});
  var map={dashboard:'vd',list:'vl',detail:'vdt',alta:'va',templates:'vt'};
  document.getElementById(map[v]).style.display='block';
  if(v==='dashboard')RD();
  else if(v==='list')RL();
  else if(v==='detail')RDT();
  else if(v==='alta')RA();
  else if(v==='templates')RT();
  US();
}

function OD(eid){
  var em=employees.find(function(x){return x.id===eid;});if(!em)return;
  var rows=DOCS.map(function(doc){var safe=doc.replace(/\s+/g,'_'),hf=em.dfiles&&em.dfiles[doc];return'<div class="dup'+(hf?' hf':'')+'" id="dr-'+eid+'-'+safe+'"><div style="font-size:18px;width:26px;text-align:center">'+(hf?'✅':'📋')+'</div><div style="flex:1"><div style="font-size:12px;font-weight:700">'+doc+'</div><div style="font-size:10px;color:#9CA3AF">'+(hf?hf.name:'Sin archivo')+'</div></div><div><input type="file" id="df-'+eid+'-'+safe+'" accept="image/*,.pdf" style="display:none" onchange="UD('+eid+',''+doc+'',this)"><button class="btn bs bsm" onclick="document.getElementById('df-'+eid+'-'+safe+'').click()">'+(hf?'🔄':'⬆️')+' '+(hf?'Cambiar':'Subir')+'</button></div></div>';}).join('');
  document.getElementById('mi').innerHTML='<div class="mh"><div class="mt">📁 Docs Drive — '+e(em.nombre)+'</div><button class="mc" onclick="CM()">✕</button></div><div style="font-size:11px;color:#9CA3AF;margin-bottom:14px">Carpeta: ROANSA RH / '+e(em.nombre)+'</div><div>'+rows+'</div><div class="ma"><button class="btn bs" onclick="CM()">Cerrar</button><a href="'+DU+'" target="_blank" class="btn bdr bsm">📁 Abrir Drive</a></div>';
  document.getElementById('modal').style.display='flex';
}
function UD(eid,doc,inp){
  var file=inp.files[0];if(!file)return;
  var em=employees.find(function(x){return x.id===eid;});if(!em)return;
  var safe=doc.replace(/\s+/g,'_'),row=document.getElementById('dr-'+eid+'-'+safe);
  var rd=new FileReader();
  rd.onload=function(ev){
    if(!em.dfiles)em.dfiles={};
    em.dfiles[doc]={name:file.name,data:ev.target.result};
    if(em.docs.indexOf(doc)<0)em.docs.push(doc);
    if(row){row.className='dup hf';row.querySelector('div:first-child').textContent='✅';row.querySelector('[style*="10px"]').textContent=file.name;}
    var a=document.createElement('a');a.href=ev.target.result;a.download=doc+'_'+em.nombre.replace(/\s+/g,'_')+'.'+file.name.split('.').pop();document.body.appendChild(a);a.click();document.body.removeChild(a);
    ST('✅ '+doc+' descargado. Subelo a Drive.');
    if(curView==='detail')RDT();
  };
  rd.readAsDataURL(file);
}
function ST(msg){var t=document.createElement('div');t.style.cssText='position:fixed;bottom:24px;right:24px;background:#1C1C1C;color:#fff;padding:14px 18px;border-radius:10px;font-size:12px;z-index:999;max-width:300px;box-shadow:0 4px 20px rgba(0,0,0,.3);line-height:1.5';t.innerHTML=msg+'<br><a href="'+DU+'" target="_blank" style="color:#60a5fa;font-weight:700;text-decoration:none">Abrir Drive →</a>';document.body.appendChild(t);setTimeout(function(){t.remove();},7000);}

  h+='<div class="steps">'+steps.map(function(s){var cls=aStep===s.n?'on':aStep>s.n?'dn':'';return'<div class="sp '+cls+'" onclick="if('+s.n+'<aStep){aStep='+s.n+';RA()}"><div class="sp-n">'+(aStep>s.n?'✓':s.i)+'</div><div class="sp-l">'+s.n+' · '+s.l+'</div></div>';}).join('')+'</div>';
  h+='<div id="astep">';

function LS(emp){
  var n=emp==='SPG'?'CONSULTORIA SPG S.C.':'PROMOTORA DE SEGURIDAD PRIVADA ROANSA S.A. DE C.V.';
  var t='CONTRATO INDIVIDUAL DE TRABAJO\n\nFECHA: {{fecha_contrato}}\nTRABAJADOR: {{nombre}}\nID: {{id_contrato}}\n\nEmpresa: '+n+'\nPuesto: {{puesto}}\nArea: {{area}}\nFecha ingreso: {{fecha_ingreso}}\nSalario mensual: ${{salario_mensual}}\n\nDatos del trabajador:\nNombre: {{nombres}} {{apellidos}}\nCURP: {{curp}} | RFC: {{rfc}} | NSS: {{nss}}\nNacimiento: {{fecha_nacimiento}} | Edad: {{edad}} anos\nEstado civil: {{estado_civil}} | Nacionalidad: {{nacionalidad}}\nDomicilio: {{calle}} {{no_exterior}}, Col. {{colonia}}, C.P. {{cp}}, {{estado}}, {{pais}}\n\nEN CIUDAD DE MEXICO, A LOS {{dia}} DIAS DEL MES DE {{mes}} DE DOS MIL VEINTISEIS.\n\n_______________________          _______________________\n   EL TRABAJADOR                   '+n+'\n   {{nombre}}                      EDUARDO ROMERO SUAREZ';
  if(emp==='ROANSA')ctROANSA=t;else ctSPG=t;RT();
}

function OE(id){
  editId=id;var em=employees.find(function(x){return x.id===id;})||{};
  var dbs=DOCS.map(function(d){var c=em.docs&&em.docs.indexOf(d)>=0;return'<button type="button" class="dt '+(c?'on':'off')+'" data-doc="'+d+'" onclick="TD(this)">'+( c?'✓':'○')+' '+d+'</button>';}).join('');
  document.getElementById('mi').innerHTML='<div class="mh"><div class="mt">✏️ Editar — '+e(em.nombre)+'</div><button class="mc" onclick="CM()">✕</button></div>'
  +'<div class="fst">Empresa</div><div style="display:flex;gap:8px;margin-bottom:14px"><button id="ebr" class="btn '+((!em.empresa||em.empresa==="ROANSA")?'bp':'bs')+'" onclick="document.getElementById('feem').value='ROANSA';document.getElementById('ebr').className='btn bp';document.getElementById('ebs').className='btn bs'">🔴 ROANSA</button><button id="ebs" class="btn '+(em.empresa==="SPG"?'bdr':'bs')+'" onclick="document.getElementById('feem').value='SPG';document.getElementById('ebs').className='btn bdr';document.getElementById('ebr').className='btn bs'">🔵 SPG</button><input type="hidden" id="feem" value="'+e(em.empresa||'ROANSA')+'"></div>'
  +'<div class="fst">Datos personales</div><div class="fg" style="gap:9px;margin-bottom:12px"><div class="fi" style="grid-column:1/-1"><label class="fl">Nombre *</label><input id="fn" value="'+e(em.nombre||'')+'"></div><div class="fi"><label class="fl">Fecha nacimiento</label><input id="fna" type="date" value="'+e(em.fechaNac||'')+'"></div><div class="fi"><label class="fl">Estado civil</label><select id="fec"><option value="">--</option>'+['Soltero/a','Casado/a','Union libre','Divorciado/a','Viudo/a'].map(function(s){return'<option'+(em.ecivil===s?' selected':'')+'>'+s+'</option>';}).join('')+'</select></div><div class="fi"><label class="fl">Nacionalidad</label><input id="fnac" value="'+e(em.nac||'Mexicana')+'"></div><div class="fi"><label class="fl">Telefono</label><input id="fte" value="'+e(em.telefono||'')+'"></div><div class="fi"><label class="fl">CURP</label><input id="fcu" value="'+e(em.curp||'')+'"></div><div class="fi"><label class="fl">RFC</label><input id="frf" value="'+e(em.rfc||'')+'"></div><div class="fi"><label class="fl">NSS</label><input id="fns" value="'+e(em.nss||'')+'"></div><div class="fi"><label class="fl">Correo</label><input id="fem" type="email" value="'+e(em.email||'')+'"></div><div class="fi"><label class="fl">Calle</label><input id="fcl" value="'+e(em.calle||'')+'"></div><div class="fi"><label class="fl">No. ext.</label><input id="fne" value="'+e(em.no_ext||'')+'"></div><div class="fi"><label class="fl">Colonia</label><input id="fco" value="'+e(em.colonia||'')+'"></div><div class="fi"><label class="fl">C.P.</label><input id="fcp" value="'+e(em.cp||'')+'"></div><div class="fi"><label class="fl">Estado</label><input id="fes" value="'+e(em.estado||'')+'"></div></div>'
  +'<div class="fst">Datos laborales</div><div class="fg" style="gap:9px;margin-bottom:12px"><div class="fi"><label class="fl">Puesto</label><select id="fpu"><option value="">--</option>'+PUESTOS.map(function(p){return'<option'+(em.puesto===p?' selected':'')+'>'+p+'</option>';}).join('')+'</select></div><div class="fi"><label class="fl">Area</label><select id="far"><option value="">--</option>'+AREAS.map(function(a){return'<option'+(em.area===a?' selected':'')+'>'+a+'</option>';}).join('')+'</select></div><div class="fi"><label class="fl">Fecha ingreso</label><input id="ffi" type="date" value="'+e(em.fechaIng||'')+'"></div><div class="fi"><label class="fl">Status</label><select id="fst2"><option'+(em.status==='Activo'?' selected':'')+'>Activo</option><option'+(em.status==='Inactivo'?' selected':'')+'>Inactivo</option><option'+(em.status==='Baja'?' selected':'')+'>Baja</option></select></div><div class="fi"><label class="fl">Contrato</label><select id="fct"><option value="">--</option>'+CONTRATOS.map(function(c){return'<option'+(em.contrato===c?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div><div class="fi"><label class="fl">Salario mensual</label><input id="fsm" type="number" value="'+e(em.salmen||'')+'"></div><div class="fi"><label class="fl">Salario diario</label><input id="fsd" type="number" value="'+e(em.saldia||'')+'"></div></div>'
  +'<div class="fst">Documentos</div><div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px" id="dbs">'+dbs+'</div>'
  +'<div class="fi"><label class="fl">Notas</label><textarea id="fno" rows="2">'+e(em.notas||'')+'</textarea></div>'
  +'<div class="ma"><button class="btn bs" onclick="CM()">Cancelar</button><button class="btn bp" onclick="SE()">💾 Guardar</button></div>';
  document.getElementById('modal').style.display='flex';
}
function TD(btn){var c=btn.classList.contains('on');btn.classList.toggle('on',!c);btn.classList.toggle('off',c);btn.textContent=(c?'○':'✓')+' '+btn.dataset.doc;}
function SE(){
  var n=gv('fn');if(!n){alert('Nombre requerido.');return;}
  var docs=Array.from(document.querySelectorAll('#dbs .dt.on')).map(function(b){return b.dataset.doc;});
  var i=employees.findIndex(function(em){return em.id===editId;});
  if(i>-1)employees[i]=Object.assign({},employees[i],{nombre:n,empresa:gv('feem')||'ROANSA',puesto:gv('fpu'),area:gv('far'),telefono:gv('fte'),email:gv('fem'),curp:gv('fcu'),rfc:gv('frf'),nss:gv('fns'),ecivil:gv('fec'),nac:gv('fnac'),calle:gv('fcl'),no_ext:gv('fne'),colonia:gv('fco'),cp:gv('fcp'),estado:gv('fes'),fechaNac:gv('fna'),fechaIng:gv('ffi'),status:gv('fst2'),contrato:gv('fct'),salmen:gv('fsm'),saldia:gv('fsd'),notas:gv('fno'),docs:docs});
  CM();RDT();US();
}
function DE(id){var em=employees.find(function(x){return x.id===id;});if(!confirm('Eliminar expediente de '+em.nombre+'?'))return;employees=employees.filter(function(x){return x.id!==id;});V('list');}
function CM(){document.getElementById('modal').style.display='none';}

V('dashboard');
} // end else (authenticated)
</script>
</body>
</html>
