<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RH ROANSA · Seguridad Privada</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; padding:0; font-family:'Segoe UI', Arial, sans-serif; background:#eef0f3; color:#231f20; }
  a { color:inherit; }
  button { cursor:pointer; font-family:inherit; }
  input, select, textarea { font-family:inherit; }

  /* ---------- LOGIN ---------- */
  #loginScreen { position:fixed; inset:0; background:linear-gradient(160deg,#111 0%,#2a2a2a 100%); display:flex; align-items:center; justify-content:center; z-index:9999; }
  .login-card { background:#fff; border-radius:14px; padding:36px 40px; width:340px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,.45); text-align:center; }
  .login-logo-box { background:#fff; border:1px solid #eee; border-radius:10px; padding:16px 10px; display:flex; align-items:center; justify-content:center; margin-bottom:22px; }
  .login-card h2 { font-size:15px; color:#666; font-weight:600; margin:0 0 18px; letter-spacing:.5px; }
  .login-card input { width:100%; padding:12px 14px; border:1px solid #ddd; border-radius:8px; font-size:15px; margin-bottom:12px; }
  .login-card button { width:100%; padding:12px 14px; border:none; border-radius:8px; background:#c8202f; color:#fff; font-size:15px; font-weight:600; }
  .login-card button:hover { background:#a11a26; }
  #loginError { color:#c8202f; font-size:13px; min-height:18px; margin-bottom:6px; }

  /* ---------- APP SHELL ---------- */
  #appRoot { display:flex; min-height:100vh; }
  #sidebar { width:230px; flex-shrink:0; background:#111; color:#fff; display:flex; flex-direction:column; padding:20px 16px; }
  .sidebar-logo-box { background:#fff; border-radius:10px; padding:14px 8px; display:flex; align-items:center; justify-content:center; margin-bottom:26px; }
  .sidebar-nav button { display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:transparent; border:none; color:#ccc; padding:12px 14px; border-radius:8px; font-size:14.5px; margin-bottom:4px; border-left:3px solid transparent; }
  .sidebar-nav button:hover { background:#1e1e1e; color:#fff; }
  .sidebar-nav button.active { background:#1e1e1e; color:#fff; border-left:3px solid #c8202f; font-weight:600; }
  .sidebar-foot { margin-top:auto; font-size:11px; color:#666; text-align:center; padding-top:16px; }

  #mainContent { flex:1; padding:28px 32px; overflow-y:auto; max-height:100vh; }
  .view-title { font-size:22px; font-weight:700; margin:0 0 4px; }
  .view-sub { color:#777; font-size:13.5px; margin:0 0 22px; }

  .cards-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:16px; margin-bottom:28px; }
  .stat-card { background:#fff; border-radius:12px; padding:18px 20px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .stat-card .num { font-size:28px; font-weight:800; color:#c8202f; }
  .stat-card .lbl { font-size:13px; color:#777; margin-top:4px; }

  .panel-cols { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media (max-width:900px){ .panel-cols{ grid-template-columns:1fr; } }
  .panel-box { background:#fff; border-radius:12px; padding:18px 20px; box-shadow:0 2px 8px rgba(0,0,0,.06); margin-bottom:20px; }
  .panel-box h3 { margin:0 0 12px; font-size:15px; }
  .list-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #f0f0f0; font-size:13.5px; }
  .list-row:last-child { border-bottom:none; }
  .pill { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:700; color:#fff; }
  .pill-roansa { background:#c8202f; }
  .pill-spg { background:#1f5fa8; }
  .pill-warn { background:#e8a200; }

  .btn { display:inline-block; padding:10px 18px; border-radius:8px; border:none; font-size:14px; font-weight:600; background:#c8202f; color:#fff; text-decoration:none; }
  .btn:hover { background:#a11a26; }
  .btn.secondary { background:#eee; color:#333; }
  .btn.secondary:hover { background:#ddd; }
  .btn.blue { background:#1f5fa8; }
  .btn.blue:hover { background:#164883; }
  .btn.small { padding:6px 12px; font-size:12.5px; }

  .toolbar { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:18px; align-items:center; }
  .toolbar input, .toolbar select { padding:9px 12px; border:1px solid #ddd; border-radius:8px; font-size:13.5px; }
  .toolbar input { flex:1; min-width:180px; }

  .emp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
  .emp-card { background:#fff; border-radius:12px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,.06); cursor:pointer; position:relative; transition:transform .1s; }
  .emp-card:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.12); }
  .emp-card .badge { position:absolute; top:12px; right:12px; }
  .emp-photo { width:56px; height:56px; border-radius:50%; background:#ddd; object-fit:cover; display:block; margin-bottom:10px; }
  .emp-photo-ph { width:56px; height:56px; border-radius:50%; background:#ccc; display:flex; align-items:center; justify-content:center; font-weight:700; color:#666; margin-bottom:10px; }
  .emp-name { font-weight:700; font-size:15px; }
  .emp-meta { font-size:12.5px; color:#777; margin-top:2px; }
  .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; }
  .status-activo { background:#2e9e4c; }
  .status-baja { background:#999; }

  .ficha-wrap { background:#fff; border-radius:12px; padding:26px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .ficha-head { display:flex; gap:20px; align-items:center; margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid #eee; }
  .ficha-photo { width:88px; height:88px; border-radius:50%; object-fit:cover; background:#ddd; }
  .ficha-photo-ph { width:88px; height:88px; border-radius:50%; background:#ccc; display:flex; align-items:center; justify-content:center; font-weight:700; color:#666; font-size:26px; }
  .datagrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px 24px; margin-bottom:22px; }
  .datagrid .dl-item .lbl { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#999; margin-bottom:2px; }
  .datagrid .dl-item .val { font-size:14.5px; font-weight:600; }
  .docs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; margin-bottom:22px; }
  .doc-item { border:1px solid #eee; border-radius:8px; padding:10px 12px; font-size:13px; display:flex; justify-content:space-between; align-items:center; }
  .doc-ok { color:#2e9e4c; font-weight:700; }
  .doc-pend { color:#c8202f; font-weight:700; }

  .steps-bar { display:flex; align-items:center; margin-bottom:26px; }
  .step-circle { width:32px; height:32px; border-radius:50%; background:#ddd; color:#666; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0; }
  .step-circle.active { background:#c8202f; color:#fff; }
  .step-circle.done { background:#2e9e4c; color:#fff; }
  .step-line { flex:1; height:2px; background:#ddd; margin:0 8px; }
  .step-label { font-size:11.5px; color:#777; text-align:center; margin-top:6px; width:100px; }
  .step-col { display:flex; flex-direction:column; align-items:center; }

  .form-box { background:#fff; border-radius:12px; padding:26px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:700px){ .form-grid{ grid-template-columns:1fr; } }
  .form-field label { display:block; font-size:12.5px; color:#666; margin-bottom:5px; font-weight:600; }
  .form-field input, .form-field select { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; }
  .empresa-picker { display:flex; gap:14px; margin-bottom:22px; }
  .empresa-opt { flex:1; border:2px solid #ddd; border-radius:10px; padding:18px; text-align:center; font-weight:700; background:#fafafa; }
  .empresa-opt.sel-roansa { border-color:#c8202f; background:#fdeceb; color:#c8202f; }
  .empresa-opt.sel-spg { border-color:#1f5fa8; background:#eaf1fb; color:#1f5fa8; }

  .doc-row { display:flex; align-items:center; justify-content:space-between; gap:14px; border:1px solid #eee; border-radius:9px; padding:12px 16px; margin-bottom:10px; flex-wrap:wrap; }
  .doc-row .doc-name { font-weight:700; font-size:14px; min-width:200px; }
  .doc-row .doc-controls { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .doc-status-tag { font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:20px; }
  .tag-recibido { background:#e4f7e9; color:#2e9e4c; }
  .tag-pendiente { background:#fdeceb; color:#c8202f; }

  .credencial-row { display:flex; gap:26px; flex-wrap:wrap; margin-bottom:20px; }
  .cred-card { width:270px; height:415px; position:relative; background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 4px 14px rgba(0,0,0,.18); }
  .cred-bg { position:absolute; top:0; left:0; width:270px; height:415px; }
  .cred-content { position:absolute; top:0; left:0; width:100%; height:100%; }
  .cred-logo-row { position:absolute; top:16px; left:16px; display:flex; align-items:center; gap:6px; }
  .cred-logo-text { font-weight:800; font-size:15px; letter-spacing:.5px; line-height:1; }
  .cred-logo-sub { font-size:6px; letter-spacing:1.5px; color:#333; }
  .cred-razon { position:absolute; top:56px; left:16px; width:150px; font-weight:800; font-size:10.5px; line-height:1.35; color:#111; text-transform:uppercase; }
  .cred-photo { position:absolute; top:130px; left:50%; transform:translateX(-50%); width:112px; height:140px; border-radius:8px; border:4px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,.25); object-fit:cover; background:#ccc; }
  .cred-photo-ph { position:absolute; top:130px; left:50%; transform:translateX(-50%); width:112px; height:140px; border-radius:8px; border:4px solid #fff; background:#ccc; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:30px; color:#888; }
  .cred-name { position:absolute; top:280px; left:0; width:185px; text-align:center; font-weight:800; font-size:12.5px; color:#111; line-height:1.25; }
  .cred-puesto { position:absolute; bottom:22px; left:0; width:100%; text-align:center; font-weight:800; font-size:12.5px; color:#fff; letter-spacing:.5px; }
  .cred-empresa-tag { position:absolute; bottom:6px; left:0; width:100%; text-align:center; font-size:8px; color:#fff; letter-spacing:2px; }
  .cred-back-top { position:absolute; top:0; left:0; width:100%; color:#fff; padding:10px 14px; font-size:10px; font-weight:700; line-height:1.6; box-sizing:border-box; }
  .cred-back-mid { position:absolute; top:70px; left:0; width:100%; height:260px; padding:14px; text-align:center; box-sizing:border-box; }
  .cred-sigline { width:70%; margin:40px auto 6px; border-bottom:1px solid #999; height:22px; }
  .cred-coord { font-weight:800; font-size:10.5px; margin-top:6px; text-transform:uppercase; }
  .cred-ssc { font-size:9.5px; margin-top:14px; }
  .cred-exp { font-size:9.5px; margin-top:4px; }
  .cred-back-bottom { position:absolute; bottom:0; left:0; width:100%; color:#fff; text-align:center; font-size:8.5px; line-height:1.6; padding:10px 10px; box-sizing:border-box; }
  .machote-status { font-size:13px; color:#444; background:#f7f7f7; border-radius:8px; padding:10px 12px; margin:10px 0; }

  .machote-cols { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  @media (max-width:900px){ .machote-cols{ grid-template-columns:1fr; } }
  .machote-box { border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .machote-box.roansa { background:#fff; border-top:5px solid #c8202f; }
  .machote-box.spg { background:#fff; border-top:5px solid #1f5fa8; }
  .machote-box h3 { margin-top:0; }
  .machote-box textarea { width:100%; height:220px; border:1px solid #ddd; border-radius:8px; padding:12px; font-size:12.5px; font-family:'Consolas',monospace; resize:vertical; }
  .vars-legend { background:#fff; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,.06); margin-top:20px; font-size:12.5px; line-height:2; color:#555; }
  .vars-legend code { background:#f2f2f2; padding:2px 6px; border-radius:5px; margin-right:6px; }

  .contract-preview { white-space:pre-wrap; background:#fbfbfb; border:1px solid #eee; border-radius:8px; padding:20px; font-size:13.5px; line-height:1.7; max-height:420px; overflow:auto; }
  .note-box { background:#fff8e6; border:1px solid #ffe6a1; border-radius:8px; padding:12px 14px; font-size:12.5px; color:#8a6600; margin-bottom:16px; }
  .empty-msg { text-align:center; color:#999; padding:40px 0; font-size:14px; }
  .back-link { display:inline-block; margin-bottom:16px; color:#c8202f; font-weight:600; font-size:13.5px; text-decoration:none; cursor:pointer; }

  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:10px; }
  .cal-dow { text-align:center; font-weight:700; font-size:12px; color:#777; padding:4px 0; }
  .cal-cell { background:#fff; border-radius:8px; min-height:92px; padding:6px; font-size:11px; box-shadow:0 1px 4px rgba(0,0,0,.05); overflow:hidden; }
  .cal-empty { background:transparent; box-shadow:none; }
  .cal-today { border:2px solid #c8202f; }
  .cal-daynum { font-weight:700; font-size:12.5px; margin-bottom:4px; }
  .cal-tag { display:block; font-size:9.5px; border-radius:5px; padding:2px 5px; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cal-tag-cumple { background:#fdeceb; color:#c8202f; }
  .cal-tag-aniv { background:#eaf1fb; color:#1f5fa8; }
  .cal-tag-vac { background:#e4f7e9; color:#2e9e4c; }
  .cal-legend { display:flex; gap:14px; font-size:12.5px; color:#555; margin-bottom:16px; flex-wrap:wrap; }
  .cal-nav-btn { min-width:38px; text-align:center; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo-box" id="loginLogoBox"></div>
    <h2>Sistema de Recursos Humanos</h2>
    <input type="password" id="loginPassword" placeholder="Contraseña" autocomplete="current-password">
    <div id="loginError"></div>
    <button id="loginBtn">Ingresar</button>
  </div>
</div>

<div id="appRoot" style="display:none;">
  <aside id="sidebar"></aside>
  <main id="mainContent"></main>
</div>

/* ================= UTILIDADES ================= */
function esc(s){
  s = (s===undefined || s===null) ? "" : String(s);
  return s.split("&").join("&amp;").split("<").join("&lt;").split(">").join("&gt;").split('"').join("&quot;");
}
function val(id){ var el = document.getElementById(id); return el ? el.value : ""; }
function byId(id){ return document.getElementById(id); }
function uid(){ return "e" + Date.now() + Math.floor(Math.random()*10000); }
function fmtDate(str){
  if(!str) return "—";
  var d = new Date(str + "T00:00:00");
  if(isNaN(d.getTime())) return str;
  return d.getDate() + " de " + MESES_ES[d.getMonth()] + " de " + d.getFullYear();
}
function calcEdad(fechaNac){
  if(!fechaNac) return "";
  var hoy = new Date();
  var nac = new Date(fechaNac + "T00:00:00");
  if(isNaN(nac.getTime())) return "";
  var edad = hoy.getFullYear() - nac.getFullYear();
  var m = hoy.getMonth() - nac.getMonth();
  if(m < 0 || (m === 0 && hoy.getDate() < nac.getDate())) edad--;
  return edad;
}
function daysUntilNextOccurrence(dateStr){
  if(!dateStr) return null;
  var base = new Date(dateStr + "T00:00:00");
  if(isNaN(base.getTime())) return null;
  var hoy = new Date();
  hoy.setHours(0,0,0,0);
  var next = new Date(hoy.getFullYear(), base.getMonth(), base.getDate());
  next.setHours(0,0,0,0);
  if(next.getTime() < hoy.getTime()) next = new Date(hoy.getFullYear()+1, base.getMonth(), base.getDate());
  var diff = Math.round((next.getTime() - hoy.getTime()) / 86400000);
  return diff;
}
function money(n){
  if(n === undefined || n === null || n === "") return "0.00";
  var num = parseFloat(n);
  if(isNaN(num)) return "0.00";
  return num.toLocaleString("es-MX", {minimumFractionDigits:2, maximumFractionDigits:2});
}
var _logoIdCounter = 0;
function logoMarkSVG(size){
  var s = size || 44;
  _logoIdCounter++;
  var n = _logoIdCounter;
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">' +
    '<defs>' +
      '<linearGradient id="gRedTR'+n+'" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#8f1622"/><stop offset="100%" stop-color="#e2432f"/></linearGradient>' +
      '<linearGradient id="gRedBL'+n+'" x1="100%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#8f1622"/><stop offset="100%" stop-color="#e2432f"/></linearGradient>' +
      '<linearGradient id="gGrayTL'+n+'" x1="100%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#8f8f8f"/><stop offset="100%" stop-color="#e2e2e2"/></linearGradient>' +
      '<linearGradient id="gGrayBR'+n+'" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8f8f8f"/><stop offset="100%" stop-color="#e2e2e2"/></linearGradient>' +
    '</defs>' +
    '<polygon points="50,4 92,50 50,50" fill="url(#gRedTR'+n+')"/>' +
    '<polygon points="8,50 50,50 50,96" fill="url(#gRedBL'+n+')"/>' +
    '<polygon points="50,50 92,50 50,96" fill="url(#gGrayBR'+n+')"/>' +
    '<polygon points="8,50 50,50 50,4" fill="url(#gGrayTL'+n+')"/>' +
    '</svg>';
}
function logoFullHTML(size){
  var s = size || 44;
  return '<div style="display:flex;align-items:center;gap:10px;">' +
    logoMarkSVG(s) +
    '<div style="line-height:1.05;">' +
      '<div style="font-weight:800;font-size:'+Math.round(s*0.5)+'px;letter-spacing:1px;">' +
        '<span style="color:#c8202f;">ROA</span><span style="color:#231f20;">NSA</span>' +
        '<sup style="font-size:'+Math.round(s*0.18)+'px;">&reg;</sup>' +
      '</div>' +
      '<div style="font-size:'+Math.round(s*0.19)+'px;color:#231f20;letter-spacing:1.5px;">SEGURIDAD PRIVADA</div>' +
    '</div>' +
  '</div>';
}

/* ================= PERSISTENCIA ================= */
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      employees: state.employees,
      machotes: state.machotes,
      vacaciones: state.vacaciones,
      folioCounter: state.folioCounter,
      contratoCounter: state.contratoCounter,
      machoteVale: state.machoteVale,
      uniformeInventario: state.uniformeInventario,
      valeCounter: state.valeCounter
    }));
  }catch(e){ console.warn("No se pudo guardar en localStorage", e); }
}
function loadState(){
  var raw = null;
  try{ raw = localStorage.getItem(STORAGE_KEY); }catch(e){}
  if(raw){
    try{
      var data = JSON.parse(raw);
      state.employees = data.employees || [];
      state.machotes = data.machotes || { ROANSA:"", SPG:"" };
      state.vacaciones = data.vacaciones || [];
      state.folioCounter = data.folioCounter || 1;
      state.contratoCounter = data.contratoCounter || 1;
      state.machoteVale = data.machoteVale || "";
      state.uniformeInventario = data.uniformeInventario || [];
      state.valeCounter = data.valeCounter || 1;
      for(var i=0;i<state.employees.length;i++){ if(!state.employees[i].vales) state.employees[i].vales = []; }
      return;
    }catch(e){ console.warn("Error leyendo datos guardados", e); }
  }
  state.employees = demoEmployees();
  state.machotes = { ROANSA:"", SPG:"" };
  state.vacaciones = [];
  state.folioCounter = 1;
  state.contratoCounter = 1;
  state.machoteVale = "";
  state.uniformeInventario = [];
  state.valeCounter = 1;
  saveState();
}
function exportarRespaldo(){
  var data = {
    _tipo: "respaldo_rh_roansa_spg", _version: 1, _fecha: new Date().toISOString(),
    employees: state.employees,
    machotes: state.machotes,
    vacaciones: state.vacaciones,
    folioCounter: state.folioCounter,
    contratoCounter: state.contratoCounter,
    machoteVale: state.machoteVale,
    uniformeInventario: state.uniformeInventario,
    valeCounter: state.valeCounter
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  var fecha = new Date().toISOString().slice(0,10);
  downloadBlob(blob, "Respaldo_RH_ROANSA_" + fecha + ".json");
}
function importarRespaldo(file, cb){
  var reader = new FileReader();
  reader.onload = function(ev){
    try{
      var data = JSON.parse(ev.target.result);
      if(!data || !Array.isArray(data.employees)){ throw new Error("El archivo no parece un respaldo válido."); }
      state.employees = data.employees || [];
      for(var i=0;i<state.employees.length;i++){ if(!state.employees[i].vales) state.employees[i].vales = []; }
      state.machotes = data.machotes || { ROANSA:"", SPG:"" };
      state.vacaciones = data.vacaciones || [];
      state.folioCounter = data.folioCounter || 1;
      state.contratoCounter = data.contratoCounter || 1;
      state.machoteVale = data.machoteVale || "";
      state.uniformeInventario = data.uniformeInventario || [];
      state.valeCounter = data.valeCounter || 1;
      saveState();
      if(cb) cb(true, null);
    }catch(err){
      if(cb) cb(false, err.message);
    }
  };
  reader.readAsText(file);
}

function fichaDocsHTML(e){
  var html = "";
  for(var i=0;i<DOCS.length;i++){
    var name = DOCS[i];
    var info = e.documentos[name] || { recibido:false, archivo:null, nombreArchivo:"" };
    html += '<div class="doc-row" data-doc="'+esc(name)+'">';
    html += '<div class="doc-name">'+esc(name)+'</div>';
    html += '<div class="doc-controls">';
    html += '<input type="file" data-fdoc-file="'+esc(name)+'">';
    html += '<label style="font-size:12.5px;"><input type="checkbox" data-fdoc-check="'+esc(name)+'" '+(info.recibido?"checked":"")+'> Marcar como recibido</label>';
    html += '<span class="doc-status-tag '+(info.recibido?"tag-recibido":"tag-pendiente")+'">'+(info.recibido?"Recibido":"Pendiente")+(info.nombreArchivo ? (" &middot; " + esc(info.nombreArchivo)) : "")+'</span>';
    html += '</div></div>';
  }
  return html;
}
function wireFichaDocs(e, el){
  var cont = byId("fichaDocsContainer");
  if(!cont) return;
  var fileInputs = cont.querySelectorAll("[data-fdoc-file]");
  for(var i=0;i<fileInputs.length;i++){
    fileInputs[i].addEventListener("change", function(ev){
      var docName = this.getAttribute("data-fdoc-file");
      var file = ev.target.files[0];
      if(!file) return;
      var reader = new FileReader();
      reader.onload = function(evt){
        if(!e.documentos[docName]) e.documentos[docName] = { recibido:false, archivo:null, nombreArchivo:"" };
        e.documentos[docName].recibido = true;
        e.documentos[docName].archivo = evt.target.result;
        e.documentos[docName].nombreArchivo = file.name;
        downloadDataUrl(file.name, evt.target.result);
        saveState();
        cont.innerHTML = fichaDocsHTML(e);
        wireFichaDocs(e, el);
      };
      reader.readAsDataURL(file);
    });
  }
  var checks = cont.querySelectorAll("[data-fdoc-check]");

        renderAltaView(el);
      });

      fileInputs[i].addEventListener("change", function(e){
        var docName = this.getAttribute("data-doc-file");

          d.documentos[docName].recibido = true;
          d.documentos[docName].archivo = ev.target.result;
          d.documentos[docName].nombreArchivo = file.name;
          downloadDataUrl(file.name, ev.target.result);
          updateDocRowUI(docName);

      saveState();
      state.altaDraft = null;
      state.altaStep = 1;
      switchView("ficha", nuevo.id);
    });
  }
}

/* ================= CONTRATO ================= */
function numeroALetras(n){
  n = Math.floor(n);
  if(n === 0) return "CERO";
  var UNIDADES = ["", "UNO", "DOS", "TRES", "CUATRO", "CINCO", "SEIS", "SIETE", "OCHO", "NUEVE"];
  var DIEZ_A_DIECINUEVE = ["DIEZ", "ONCE", "DOCE", "TRECE", "CATORCE", "QUINCE", "DIECISEIS", "DIECISIETE", "DIECIOCHO", "DIECINUEVE"];
  var DECENAS = ["", "", "VEINTE", "TREINTA", "CUARENTA", "CINCUENTA", "SESENTA", "SETENTA", "OCHENTA", "NOVENTA"];
  var VEINTES = ["VEINTE", "VEINTIUNO", "VEINTIDOS", "VEINTITRES", "VEINTICUATRO", "VEINTICINCO", "VEINTISEIS", "VEINTISIETE", "VEINTIOCHO", "VEINTINUEVE"];
  var CENTENAS = ["", "CIENTO", "DOSCIENTOS", "TRESCIENTOS", "CUATROCIENTOS", "QUINIENTOS", "SEISCIENTOS", "SETECIENTOS", "OCHOCIENTOS", "NOVECIENTOS"];
  function tresDigitos(num){
    num = num % 1000;
    var c = Math.floor(num / 100);
    var resto = num % 100;
    var out = "";
    if(num === 100){ return "CIEN"; }
    if(c > 0){ out += CENTENAS[c]; }
    if(resto > 0){
      if(out) out += " ";
      if(resto < 10){ out += UNIDADES[resto]; }
      else if(resto < 20){ out += DIEZ_A_DIECINUEVE[resto - 10]; }
      else if(resto < 30){ out += VEINTES[resto - 20]; }
      else{
        var d = Math.floor(resto / 10);
        var u = resto % 10;
        out += DECENAS[d];
        if(u > 0){ out += " Y " + UNIDADES[u]; }
      }
    }
    return out;
  }
  function seccion(num, divisor, singular, plural){
    var cientos = Math.floor(num / divisor);
    var resto = num % divisor;
    var out = "";
    if(cientos > 0){
      if(cientos === 1){ out = singular; }
      else{ out = tresDigitos(cientos) + " " + plural; }
    }
    return { texto: out, resto: resto };
  }
  var millones = seccion(n, 1000000, "UN MILLON", "MILLONES");
  var miles = seccion(millones.resto, 1000, "MIL", "MIL");
  var centenas = tresDigitos(miles.resto);
  var partes = [];
  if(millones.texto) partes.push(millones.texto);
  if(miles.texto) partes.push(miles.texto);
  if(centenas) partes.push(centenas);
  return partes.join(" ").replace(/\s+/g, " ").trim();
}
function montoALetras(monto){
  monto = parseFloat(monto) || 0;
  var entero = Math.floor(monto);
  var centavos = Math.round((monto - entero) * 100);
  if(centavos >= 100){ entero += 1; centavos -= 100; }
  var letras = numeroALetras(entero);
  if(/UNO$/.test(letras)){ letras = letras.replace(/UNO$/, "UN"); }
  var centavosStr = (centavos < 10 ? "0" : "") + centavos;
  return letras + " PESOS " + centavosStr + "/100 M.N.";
}

  }

function base64ToArrayBuffer(base64){
  var binary = atob(base64);
  var len = binary.length;
  var bytes = new Uint8Array(len);
  for(var i=0;i<len;i++){ bytes[i] = binary.charCodeAt(i); }
  return bytes.buffer;
}
function base64ToBlob(base64){
  return new Blob([base64ToArrayBuffer(base64)], { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
}
function generarDocxDesdeMachote(machoteBase64, vars){
  var zip = new PizZip(base64ToArrayBuffer(machoteBase64));
  var DocxCtor = window.docxtemplater.default || window.docxtemplater;
  var doc = new DocxCtor(zip, { paragraphLoop: true, linebreaks: true, delimiters: { start: "{{", end: "}}" } });
  doc.render(vars);
  return doc.getZip().generate({ type: "blob", mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
}
function downloadBlob(blob, filename){
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);

  { slug:"horno_microondas", nombre:"HORNO DE MICROONDAS" }
];
function catalogoDe(categoria){ return categoria === "complemento" ? CAT_COMPLEMENTOS : CAT_UNIFORME; }
function catalogoItem(categoria, slug){
  var cat = catalogoDe(categoria);
  for(var i=0;i<cat.length;i++){ if(cat[i].slug === slug) return cat[i]; }
  return null;
}
function inventarioDisponible(categoria, tipo, talla){
  var total = 0;
  for(var i=0;i<state.uniformeInventario.length;i++){
    var it = state.uniformeInventario[i];
    if(it.categoria === categoria && it.tipo === tipo && (categoria === "complemento" || it.talla === talla)){
      total += Number(it.cantidad) || 0;
    }
  }
  return total;
}
function descontarInventario(categoria, tipo, talla, cantidad){
  var restante = Number(cantidad) || 0;
  for(var i=0;i<state.uniformeInventario.length && restante > 0;i++){
    var it = state.uniformeInventario[i];
    if(it.categoria === categoria && it.tipo === tipo && (categoria === "complemento" || it.talla === talla)){
      var uso = Math.min(Number(it.cantidad) || 0, restante);
      it.cantidad = (Number(it.cantidad) || 0) - uso;
      restante -= uso;
    }
  }
}

function wireInvListaBotones(el){

      for(var j=0;j<state.uniformeInventario.length;j++){
        if(state.uniformeInventario[j].id === id){ state.uniformeInventario[j].cantidad = nuevo; break; }
      }
      saveState();
    });
  }
  var dels = el.querySelectorAll("[data-inv-del]");
  for(i=0;i<dels.length;i++){

      state.uniformeInventario = state.uniformeInventario.filter(function(it){ return it.id !== id; });
      saveState();
      renderUniformesView(el);
    });
  }
}

function blobToBase64(blob, cb){
  var reader = new FileReader();
  reader.onload = function(ev){ cb(String(ev.target.result).split(",")[1]); };
  reader.readAsDataURL(blob);
}
function buildValeVars(e, folio, fecha, servicio, seleccion){
  var vars = {
    nombre: e.nombre, servicio: servicio || e.area || "", empresa: e.empresa,
    fecha_entrega: fmtDate(fecha), folio_vale: folio
  };
  var i;
  for(i=0;i<CAT_UNIFORME.length;i++){
    var it = CAT_UNIFORME[i];
    var sel = seleccion[it.slug];
    if(!it.tallaFija){ vars[it.slug + "_talla"] = sel ? (sel.talla || "") : ""; }
    vars[it.slug + "_cant"] = sel ? (sel.cantidad || "") : "";
    vars[it.slug + "_bord"] = sel ? (sel.bordado || "") : "";
  }
  for(i=0;i<CAT_COMPLEMENTOS.length;i++){
    var c = CAT_COMPLEMENTOS[i];
    var selc = seleccion[c.slug];
    vars[c.slug + "_cant"] = selc ? (selc.cantidad || "") : "";
  }
  return vars;
}

function wireValeForm(el, e){

  function actualizarDisp(categoria, slug){

  for(i=0;i<CAT_UNIFORME.length;i++){
    (function(slug){
      actualizarDisp("uniforme", slug);
      var tallaInput = el.querySelector('[data-vale-talla="'+slug+'"]');
      if(tallaInput){ tallaInput.addEventListener("input", function(){ actualizarDisp("uniforme", slug); }); }
    })(CAT_UNIFORME[i].slug);
  }
  for(i=0;i<CAT_COMPLEMENTOS.length;i++){
    (function(slug){ actualizarDisp("complemento", slug); })(CAT_COMPLEMENTOS[i].slug);
  }

  el.querySelector('[data-action="generar-vale"]').addEventListener("click", function(){
    var servicio = val("valeServicio");
    var fecha = val("valeFecha");
    if(!fecha){ alert("Indica la fecha de entrega."); return; }
    var seleccion = {};
    var itemsParaDescontar = [];
    var itemsResumen = [];
    var faltantes = [];
    var i2;
    for(i2=0;i2<CAT_UNIFORME.length;i2++){
      var it = CAT_UNIFORME[i2];
      var check = el.querySelector('[data-vale-check="'+it.slug+'"]');
      if(check && check.checked){
        var tallaInput = el.querySelector('[data-vale-talla="'+it.slug+'"]');
        var talla = it.tallaFija || (tallaInput ? tallaInput.value.trim().toUpperCase() : "");
        var cantInput = el.querySelector('[data-vale-cant="'+it.slug+'"]');
        var cantidad = parseInt(cantInput.value, 10) || 0;
        var bordInput = el.querySelector('[data-vale-bord="'+it.slug+'"]');
        var bordado = bordInput ? bordInput.value.trim() : "";
        if(!talla){ alert("Indica la talla de: " + it.nombre); return; }
        if(cantidad <= 0){ alert("Indica una cantidad válida para: " + it.nombre); return; }
        var disp = inventarioDisponible("uniforme", it.slug, talla);
        if(cantidad > disp){ faltantes.push(it.nombre + " (talla " + talla + "): pediste " + cantidad + ", disponibles " + disp); }
        seleccion[it.slug] = { talla: talla, cantidad: cantidad, bordado: bordado };
        itemsParaDescontar.push({ categoria:"uniforme", tipo:it.slug, talla:talla, cantidad:cantidad });
        itemsResumen.push({ categoria:"uniforme", tipo:it.slug, nombre:it.nombre, talla:talla, cantidad:cantidad, bordado:bordado });
      }
    }
    for(i2=0;i2<CAT_COMPLEMENTOS.length;i2++){
      var c = CAT_COMPLEMENTOS[i2];
      var checkc = el.querySelector('[data-vale-check="'+c.slug+'"]');
      if(checkc && checkc.checked){
        var cantInputC = el.querySelector('[data-vale-cant="'+c.slug+'"]');
        var cantidadC = parseInt(cantInputC.value, 10) || 0;
        if(cantidadC <= 0){ alert("Indica una cantidad válida para: " + c.nombre); return; }
        var dispC = inventarioDisponible("complemento", c.slug, "");
        if(cantidadC > dispC){ faltantes.push(c.nombre + ": pediste " + cantidadC + ", disponibles " + dispC); }
        seleccion[c.slug] = { cantidad: cantidadC };
        itemsParaDescontar.push({ categoria:"complemento", tipo:c.slug, talla:"", cantidad:cantidadC });
        itemsResumen.push({ categoria:"complemento", tipo:c.slug, nombre:c.nombre, talla:"", cantidad:cantidadC, bordado:"" });
      }
    }
    if(itemsResumen.length === 0){ alert("Selecciona al menos una prenda o artículo para entregar."); return; }
    if(faltantes.length > 0){
      alert("No hay inventario suficiente para:\n" + faltantes.join("\n") + "\n\nAjusta las cantidades o agrega más inventario antes de generar el vale.");
      return;
    }
    try{
      var folio = "VALE-" + String(state.valeCounter).padStart(4, "0");
      var vars = buildValeVars(e, folio, fecha, servicio, seleccion);
      var blob = generarDocxDesdeMachote(state.machoteVale, vars);
      var fileName = "Vale_Uniforme_" + (e.nombre || "empleado").replace(/[^a-zA-Z0-9]+/g, "_") + "_" + folio + ".docx";
      downloadBlob(blob, fileName);
      for(i2=0;i2<itemsParaDescontar.length;i2++){
        var d = itemsParaDescontar[i2];
        descontarInventario(d.categoria, d.tipo, d.talla, d.cantidad);
      }
      state.valeCounter++;
      blobToBase64(blob, function(base64){
        if(!e.vales) e.vales = [];
        e.vales.push({ id: uid(), folio: folio, fecha: fecha, servicio: servicio, empresa: e.empresa, items: itemsResumen, docxBase64: base64, adjuntadoExpediente: false });
        saveState();
        var statusEl = byId("valeStatus");
        if(statusEl){ statusEl.textContent = "Vale " + folio + " generado y descargado como " + fileName + "."; }
        var lista = byId("valesLista") || byId("fichaValesContainer");
        if(lista){ lista.innerHTML = fichaValesListaHTML(e); wireValesLista(el, e); }
      });
    }catch(err){
      var msg = err.message;
      if(err.properties && err.properties.errors && err.properties.errors.length){
        msg = err.properties.errors.map(function(er){ return er.message; }).join(" | ");
      }
      alert("No se pudo generar el vale: " + msg);
    }
  });
}
function fichaValesListaHTML(e){
  var vales = e.vales || [];
  if(vales.length === 0){ return '<div class="empty-msg">Sin vales de uniforme generados.</div>'; }
  var lista = vales.slice().reverse();
  var html = "";
  for(var i=0;i<lista.length;i++){
    var v = lista[i];
    var resumen = v.items.map(function(it){ return it.nombre + (it.talla ? (" (" + it.talla + ")") : "") + " x" + it.cantidad; }).join(", ");
    html += '<div class="doc-row"><div class="doc-name" style="min-width:0;">' + esc(v.folio) + ' &middot; ' + fmtDate(v.fecha) + '<br><span style="font-weight:400;font-size:12px;color:#777;">' + esc(resumen) + '</span></div>';
    html += '<div class="doc-controls">';
    html += '<span class="doc-status-tag ' + (v.adjuntadoExpediente ? "tag-recibido" : "tag-pendiente") + '">' + (v.adjuntadoExpediente ? "Adjunto al expediente" : "No adjuntado") + '</span>';
    html += '<button class="btn small secondary" data-vale-descargar="' + v.id + '">Descargar de nuevo</button>';
    html += '<button class="btn small secondary" data-vale-adjuntar="' + v.id + '">' + (v.adjuntadoExpediente ? "Quitar del expediente" : "Adjuntar al expediente") + '</button>';
    html += '</div></div>';
  }
  return html;
}
function wireValesLista(el, e){
  var descBtns = el.querySelectorAll("[data-vale-descargar]");
  var i;
  for(i=0;i<descBtns.length;i++){
    descBtns[i].addEventListener("click", function(){
      var id = this.getAttribute("data-vale-descargar");
      var v = null;
      for(var j=0;j<e.vales.length;j++){ if(e.vales[j].id === id){ v = e.vales[j]; break; } }
      if(!v) return;
      downloadBlob(base64ToBlob(v.docxBase64), "Vale_Uniforme_" + (e.nombre||"empleado").replace(/[^a-zA-Z0-9]+/g,"_") + "_" + v.folio + ".docx");
    });
  }
  var adjBtns = el.querySelectorAll("[data-vale-adjuntar]");
  for(i=0;i<adjBtns.length;i++){
    adjBtns[i].addEventListener("click", function(){
      var id = this.getAttribute("data-vale-adjuntar");
      for(var j=0;j<e.vales.length;j++){
        if(e.vales[j].id === id){ e.vales[j].adjuntadoExpediente = !e.vales[j].adjuntadoExpediente; break; }
      }
      saveState();
      var lista = byId("valesLista") || byId("fichaValesContainer");
      if(lista){ lista.innerHTML = fichaValesListaHTML(e); wireValesLista(el, e); }
    });
  }
}

function openPrintWindow(title, bodyHtml, extraCss){
  var w = window.open("", "_blank", "width=900,height=700");
  if(!w){ alert("Permite las ventanas emergentes para poder imprimir."); return; }
  var css = "body{margin:0;padding:0;} " + (extraCss || "");
  var doc = w.document;
  doc.open();
  doc.write("<!DOCTYPE html><html><head><title>" + esc(title) + "</title><meta charset='UTF-8'><style>" + css + "</style></head><body>" + bodyHtml + "</body></html>");
  doc.close();
  w.focus();
  setTimeout(function(){ w.print(); }, 350);
}

/* ================= VACACIONES POR LEY (Art. 76 LFT, reforma vigente 2023) ================= */
function antiguedadAnios(fechaIngreso){
  if(!fechaIngreso) return 0;
  var ing = new Date(fechaIngreso + "T00:00:00");
  if(isNaN(ing.getTime())) return 0;
  var hoy = new Date();
  var anios = hoy.getFullYear() - ing.getFullYear();
  var m = hoy.getMonth() - ing.getMonth();
  if(m < 0 || (m === 0 && hoy.getDate() < ing.getDate())) anios--;
  return Math.max(0, anios);
}
function diasVacacionesLey(anios){
  if(anios < 1) return 0;
  if(anios === 1) return 12;
  if(anios === 2) return 14;
  if(anios === 3) return 16;
  if(anios === 4) return 18;
  if(anios === 5) return 20;
  var bloque = Math.floor((anios - 6) / 5);
  return 22 + bloque * 2;
}

function fichaSSPCHTML(e){
  if(!e.sspc) e.sspc = { alta:"", documentos:[] };
  var html = '<h3 style="margin-bottom:12px;">Alta SSPC</h3>';
  html += '<div class="form-field" style="max-width:260px;margin-bottom:14px;"><label>&#191;Se dio de alta ante la SSPC?</label>';
  html += '<select id="sspcAltaSelect"><option value="">Seleccionar...</option><option value="SI" '+(e.sspc.alta==="SI"?"selected":"")+'>S&iacute;</option><option value="NO" '+(e.sspc.alta==="NO"?"selected":"")+'>No</option></select></div>';
  html += '<div id="sspcDocsWrap">' + (e.sspc.alta === "SI" ? sspcBlockHTML(e) : "") + '</div>';
  return html;
}
function sspcBlockHTML(e){
  var html = '<div class="note-box">Agrega y sube los documentos del expediente de alta SSPC.</div>';
  html += '<div id="sspcDocsContainer">' + sspcDocsHTML(e) + '</div>';
  html += '<button class="btn small secondary" data-action="sspc-agregar-doc" style="margin-top:8px;">+ Agregar documento</button>';
  return html;
}
function sspcDocsHTML(e){
  var html = "";
  for(var i=0;i<e.sspc.documentos.length;i++){
    var doc = e.sspc.documentos[i];
    html += '<div class="doc-row">';
    html += '<div class="doc-name">'+esc(doc.nombre)+'</div>';
    html += '<div class="doc-controls">';
    html += '<input type="file" data-sspc-file="'+i+'">';
    html += '<label style="font-size:12.5px;"><input type="checkbox" data-sspc-check="'+i+'" '+(doc.recibido?"checked":"")+'> Recibido</label>';
    html += '<span class="doc-status-tag '+(doc.recibido?"tag-recibido":"tag-pendiente")+'">'+(doc.recibido?"Recibido":"Pendiente")+(doc.nombreArchivo?(" &middot; "+esc(doc.nombreArchivo)):"")+'</span>';
    html += '<button class="btn small secondary" data-sspc-del="'+i+'">Quitar</button>';
    html += '</div></div>';
  }
  if(e.sspc.documentos.length === 0){ html += '<div class="empty-msg">Aún no hay documentos agregados.</div>'; }
  return html;
}
function wireFichaSSPC(e, el){
  var sel = byId("sspcAltaSelect");
  if(!sel) return;
  sel.addEventListener("change", function(){
    e.sspc.alta = this.value;
    saveState();
    byId("sspcDocsWrap").innerHTML = e.sspc.alta === "SI" ? sspcBlockHTML(e) : "";
    wireSSPCDocs(e, el);
    wireSSPCAddButton(e, el);
  });
  wireSSPCDocs(e, el);
  wireSSPCAddButton(e, el);
}
function wireSSPCAddButton(e, el){
  var addBtn = el.querySelector('[data-action="sspc-agregar-doc"]');
  if(addBtn){
    addBtn.addEventListener("click", function(){
      var nombre = window.prompt("Nombre del documento (por ejemplo: Oficio de alta, Comprobante de pago...)");
      if(!nombre) return;
      e.sspc.documentos.push({ nombre: nombre, recibido:false, archivo:null, nombreArchivo:"" });
      saveState();
      byId("sspcDocsContainer").innerHTML = sspcDocsHTML(e);
      wireSSPCDocs(e, el);
    });
  }
}
function wireSSPCDocs(e, el){
  var cont = byId("sspcDocsContainer");
  if(!cont) return;
  var fileInputs = cont.querySelectorAll("[data-sspc-file]");
  for(var i=0;i<fileInputs.length;i++){
    fileInputs[i].addEventListener("change", function(ev){
      var idx = parseInt(this.getAttribute("data-sspc-file"), 10);
      var file = ev.target.files[0];
      if(!file) return;
      var reader = new FileReader();
      reader.onload = function(evt){
        e.sspc.documentos[idx].recibido = true;
        e.sspc.documentos[idx].archivo = evt.target.result;
        e.sspc.documentos[idx].nombreArchivo = file.name;
        downloadDataUrl(file.name, evt.target.result);
        saveState();
        cont.innerHTML = sspcDocsHTML(e);
        wireSSPCDocs(e, el);
      };
      reader.readAsDataURL(file);
    });
  }
  var checks = cont.querySelectorAll("[data-sspc-check]");
  for(i=0;i<checks.length;i++){
    checks[i].addEventListener("change", function(){
      var idx = parseInt(this.getAttribute("data-sspc-check"), 10);
      e.sspc.documentos[idx].recibido = this.checked;
      if(!this.checked){ e.sspc.documentos[idx].archivo = null; e.sspc.documentos[idx].nombreArchivo = ""; }
      saveState();
      cont.innerHTML = sspcDocsHTML(e);
      wireSSPCDocs(e, el);
    });
  }
  var dels = cont.querySelectorAll("[data-sspc-del]");
  for(i=0;i<dels.length;i++){
    dels[i].addEventListener("click", function(){
      var idx = parseInt(this.getAttribute("data-sspc-del"), 10);
      e.sspc.documentos.splice(idx, 1);
      saveState();
      cont.innerHTML = sspcDocsHTML(e);
      wireSSPCDocs(e, el);
    });
  }
}

/* ================= CALENDARIO ================= */
function sameYMD(dateObj, y, m, d){
  return dateObj.getFullYear() === y && dateObj.getMonth() === m && dateObj.getDate() === d;
}
function eventosDelDia(y, m, d){
  var cumple = [], aniv = [], vac = [];
  var i, e;
  for(i=0;i<state.employees.length;i++){
    e = state.employees[i];
    if(e.fecha_nacimiento){
      var nac = new Date(e.fecha_nacimiento + "T00:00:00");
      if(!isNaN(nac.getTime()) && nac.getMonth() === m && nac.getDate() === d) cumple.push(e.nombre);
    }
    if(e.fecha_ingreso){
      var ing = new Date(e.fecha_ingreso + "T00:00:00");
      if(!isNaN(ing.getTime()) && ing.getMonth() === m && ing.getDate() === d) aniv.push(e.nombre);
    }
  }
  var cur = new Date(y, m, d); cur.setHours(0,0,0,0);
  for(i=0;i<state.vacaciones.length;i++){
    var v = state.vacaciones[i];
    var ini = new Date(v.inicio + "T00:00:00");
    var fin = new Date(v.fin + "T00:00:00");
    if(cur.getTime() >= ini.getTime() && cur.getTime() <= fin.getTime()){
      var emp = findEmployee(v.empleadoId);
      vac.push(emp ? emp.nombre : "Empleado");
    }
  }
  return { cumple:cumple, aniv:aniv, vac:vac };
}
function renderCalendarioView(el){
  if(state.calYear === null || state.calYear === undefined){
    var t = new Date();
    state.calYear = t.getFullYear();
    state.calMonth = t.getMonth();
  }
  var y = state.calYear, m = state.calMonth;
  var first = new Date(y, m, 1);
  var startWeekday = first.getDay();
  var daysInMonth = new Date(y, m + 1, 0).getDate();
  var diasSemana = ["Dom","Lun","Mar","Mi&eacute;","Jue","Vie","S&aacute;b"];

  var html = '<h1 class="view-title">Calendario</h1>';
  html += '<p class="view-sub">Cumplea&ntilde;os y aniversarios autom&aacute;ticos &middot; vacaciones marcadas manualmente</p>';

  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">';
  html += '<button class="btn secondary small cal-nav-btn" data-cal-nav="prev">&larr;</button>';
  html += '<div style="font-weight:700;font-size:16px;min-width:170px;text-align:center;">'+(MESES_ES[m].charAt(0).toUpperCase()+MESES_ES[m].slice(1))+' '+y+'</div>';
  html += '<button class="btn secondary small cal-nav-btn" data-cal-nav="next">&rarr;</button>';
  html += '<button class="btn secondary small" data-cal-nav="hoy">Hoy</button>';
  html += '</div>';

  html += '<div class="cal-legend">';
  html += '<span class="cal-tag cal-tag-cumple">&#127874; Cumplea&ntilde;os</span>';
  html += '<span class="cal-tag cal-tag-aniv">&#127881; Aniversario</span>';
  html += '<span class="cal-tag cal-tag-vac">&#127958; Vacaciones</span>';
  html += '</div>';

  html += '<div class="cal-grid">';
  for(var i=0;i<7;i++){ html += '<div class="cal-dow">'+diasSemana[i]+'</div>'; }
  for(i=0;i<startWeekday;i++){ html += '<div class="cal-cell cal-empty"></div>'; }
  for(var d=1; d<=daysInMonth; d++){
    var evs = eventosDelDia(y, m, d);
    var isToday = sameYMD(new Date(), y, m, d);
    html += '<div class="cal-cell'+(isToday?" cal-today":"")+'">';
    html += '<div class="cal-daynum">'+d+'</div>';
    for(var j=0;j<evs.cumple.length;j++){ html += '<div class="cal-tag cal-tag-cumple" title="Cumplea&ntilde;os: '+esc(evs.cumple[j])+'">&#127874; '+esc(evs.cumple[j])+'</div>'; }
    for(j=0;j<evs.aniv.length;j++){ html += '<div class="cal-tag cal-tag-aniv" title="Aniversario: '+esc(evs.aniv[j])+'">&#127881; '+esc(evs.aniv[j])+'</div>'; }
    for(j=0;j<evs.vac.length;j++){ html += '<div class="cal-tag cal-tag-vac" title="Vacaciones: '+esc(evs.vac[j])+'">&#127958; '+esc(evs.vac[j])+'</div>'; }
    html += '</div>';
  }
  html += '</div>';

  html += '<div class="form-box" style="margin-top:24px;"><h3>Registrar periodo de vacaciones</h3>';
  html += '<div class="form-grid">';
  html += '<div class="form-field"><label>Empleado</label><select id="vacEmpleado">';
  for(i=0;i<state.employees.length;i++){ html += '<option value="'+state.employees[i].id+'">'+esc(state.employees[i].nombre)+'</option>'; }
  html += '</select></div>';
  html += '<div class="form-field"><label>Fecha inicio</label><input type="date" id="vacInicio"></div>';
  html += '<div class="form-field"><label>Fecha fin</label><input type="date" id="vacFin"></div>';
  html += '</div>';
  html += '<button class="btn" data-action="agregar-vacacion" style="margin-top:10px;">Agregar vacaciones</button>';
  html += '</div>';

  html += '<div class="panel-box" style="margin-top:20px;"><h3>Periodos registrados</h3><div id="vacacionesLista"></div></div>';

  el.innerHTML = html;

  var navBtns = el.querySelectorAll("[data-cal-nav]");
  for(i=0;i<navBtns.length;i++){
    navBtns[i].addEventListener("click", function(){
      var dir = this.getAttribute("data-cal-nav");
      if(dir === "prev"){ state.calMonth--; if(state.calMonth < 0){ state.calMonth = 11; state.calYear--; } }
      else if(dir === "next"){ state.calMonth++; if(state.calMonth > 11){ state.calMonth = 0; state.calYear++; } }
      else { var t2 = new Date(); state.calYear = t2.getFullYear(); state.calMonth = t2.getMonth(); }
      renderCalendarioView(el);
    });
  }
  el.querySelector('[data-action="agregar-vacacion"]').addEventListener("click", function(){
    var empId = val("vacEmpleado");
    var ini = val("vacInicio");
    var fin = val("vacFin");
    if(!empId || !ini || !fin){ alert("Selecciona empleado y ambas fechas."); return; }
    if(fin < ini){ alert("La fecha fin debe ser posterior o igual a la fecha inicio."); return; }
    state.vacaciones.push({ id: uid(), empleadoId: empId, inicio: ini, fin: fin });
    saveState();
    renderCalendarioView(el);
  });
  renderVacacionesLista(el);
}
function renderVacacionesLista(el){
  var cont = byId("vacacionesLista");
  if(!cont) return;
  if(state.vacaciones.length === 0){ cont.innerHTML = '<div class="empty-msg">Sin periodos registrados.</div>'; return; }
  var lista = state.vacaciones.slice().sort(function(a,b){ return a.inicio < b.inicio ? -1 : (a.inicio > b.inicio ? 1 : 0); });
  var html = "";
  for(var i=0;i<lista.length;i++){
    var v = lista[i];
    var emp = findEmployee(v.empleadoId);
    html += '<div class="list-row"><span>'+esc(emp?emp.nombre:"?")+' &middot; '+fmtDate(v.inicio)+' a '+fmtDate(v.fin)+'</span><button class="btn small secondary" data-del-vac="'+v.id+'">Eliminar</button></div>';
  }
  cont.innerHTML = html;
  var delBtns = cont.querySelectorAll("[data-del-vac]");
  for(i=0;i<delBtns.length;i++){
    delBtns[i].addEventListener("click", function(){
      var id = this.getAttribute("data-del-vac");
      state.vacaciones = state.vacaciones.filter(function(item){ return item.id !== id; });
      saveState();
      renderCalendarioView(el);
    });
  }
}
