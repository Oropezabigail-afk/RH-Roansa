<body>

<script>

/* ================= ESTADO ================= */
var state = {

/* ================= UTILIDADES ================= */
function esc(s){
  s = (s===undefined || s===null) ? "" : String(s);
  return s.split("&").join("&amp;").split("<").join("&lt;").split(">").join("&gt;").split('"').join("&quot;");
}
function val(id){ var el = document.getElementById(id); return el ? el.value : ""; }
function byId(id){ return document.getElementById(id); }
function uid(){ return "e" + Date.now() + Math.floor(Math.random()*10000); }
function fmtDate(str){
  if(!str) return "—";
  var d = new Date(str + "T00:00:00");
  if(isNaN(d.getTime())) return str;
  return d.getDate() + " de " + MESES_ES[d.getMonth()] + " de " + d.getFullYear();
}
function calcEdad(fechaNac){
  if(!fechaNac) return "";
  var hoy = new Date();
  var nac = new Date(fechaNac + "T00:00:00");
  if(isNaN(nac.getTime())) return "";
  var edad = hoy.getFullYear() - nac.getFullYear();
  var m = hoy.getMonth() - nac.getMonth();
  if(m < 0 || (m === 0 && hoy.getDate() < nac.getDate())) edad--;
  return edad;
}
function daysUntilNextOccurrence(dateStr){
  if(!dateStr) return null;
  var base = new Date(dateStr + "T00:00:00");
  if(isNaN(base.getTime())) return null;
  var hoy = new Date();
  hoy.setHours(0,0,0,0);
  var next = new Date(hoy.getFullYear(), base.getMonth(), base.getDate());
  next.setHours(0,0,0,0);
  if(next.getTime() < hoy.getTime()) next = new Date(hoy.getFullYear()+1, base.getMonth(), base.getDate());
  var diff = Math.round((next.getTime() - hoy.getTime()) / 86400000);
  return diff;
}
function money(n){
  if(n === undefined || n === null || n === "") return "0.00";
  var num = parseFloat(n);
  if(isNaN(num)) return "0.00";
  return num.toLocaleString("es-MX", {minimumFractionDigits:2, maximumFractionDigits:2});
}
function logoMarkSVG(size){
  var s = size || 44;
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">' +
    '<polygon points="50,4 92,50 50,50" fill="#c8202f"/>' +
    '<polygon points="8,50 50,50 50,96" fill="#c8202f"/>' +
    '<polygon points="50,50 92,50 50,96" fill="#bdbdbd"/>' +
    '<polygon points="8,50 50,50 50,4" fill="#bdbdbd"/>' +
    '</svg>';
}
function logoFullHTML(size){
  var s = size || 44;
  return '<div style="display:flex;align-items:center;gap:10px;">' +
    logoMarkSVG(s) +
    '<div style="line-height:1.05;">' +
      '<div style="font-weight:800;font-size:'+Math.round(s*0.5)+'px;letter-spacing:1px;">' +
        '<span style="color:#c8202f;">ROA</span><span style="color:#231f20;">NSA</span>' +
        '<sup style="font-size:'+Math.round(s*0.18)+'px;">&reg;</sup>' +
      '</div>' +
      '<div style="font-size:'+Math.round(s*0.19)+'px;color:#231f20;letter-spacing:1.5px;">SEGURIDAD PRIVADA</div>' +
    '</div>' +
  '</div>';
}

/* ================= PERSISTENCIA ================= */
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      employees: state.employees,
      machotes: state.machotes,
      folioCounter: state.folioCounter,
      contratoCounter: state.contratoCounter
    }));
  }catch(e){ console.warn("No se pudo guardar en localStorage", e); }
}
function loadState(){
  var raw = null;
  try{ raw = localStorage.getItem(STORAGE_KEY); }catch(e){}
  if(raw){
    try{
      var data = JSON.parse(raw);
      state.employees = data.employees || [];
      state.machotes = data.machotes || { ROANSA:"", SPG:"" };
      state.folioCounter = data.folioCounter || 1;
      state.contratoCounter = data.contratoCounter || 1;
      return;
    }catch(e){ console.warn("Error leyendo datos guardados", e); }
  }
  state.employees = demoEmployees();
  state.machotes = { ROANSA:"", SPG:"" };
  state.folioCounter = 1;
  state.contratoCounter = 1;
  saveState();
}
function blankDocs(){
  var d = {};
  for(var i=0;i<DOCS.length;i++){ d[DOCS[i]] = { recibido:false, archivo:null, nombreArchivo:"" }; }

  for(var i=0;i<state.employees.length;i++){ if(state.employees[i].id === id) return state.employees[i]; }

/* ================= LOGIN ================= */
function initLogin(){
  byId("loginLogoBox").innerHTML = logoFullHTML(50);
  byId("loginBtn").addEventListener("click", tryLogin);
  byId("loginPassword").addEventListener("keydown", function(e){ if(e.key === "Enter") tryLogin(); });
  var already = false;
  try{ already = sessionStorage.getItem(SESSION_KEY) === "ok"; }catch(e){}
  if(already){ showApp(); } else { byId("loginScreen").style.display = "flex"; }
}
function tryLogin(){
  var pass = val("loginPassword");
  if(pass === PASSWORD){
    try{ sessionStorage.setItem(SESSION_KEY, "ok"); }catch(e){}
    showApp();
  } else {
    byId("loginError").textContent = "Contraseña incorrecta. Intenta de nuevo.";
  }
}
function showApp(){
  byId("loginScreen").style.display = "none";
  byId("appRoot").style.display = "flex";
  loadState();
  switchView("panel");
}

  ];

function switchView(name, param){
  state.view = name;
  state.viewParam = param;
  if(name === "alta" && !state.altaDraft){ state.altaStep = 1; state.altaDraft = newAltaDraft(); }
  renderSidebar();
  renderMain();
  window.scrollTo(0,0);
}

function renderMain(){
  var el = byId("mainContent");
  if(state.view === "panel") return renderPanelView(el);
  if(state.view === "empleados") return renderEmpleadosView(el);
  if(state.view === "ficha") return renderFichaView(el, state.viewParam);
  if(state.view === "alta") return renderAltaView(el);
  if(state.view === "machotes") return renderMachotesView(el);
  if(state.view === "credencial") return renderCredencialView(el, state.viewParam);
  if(state.view === "contrato") return renderContratoView(el, state.viewParam);
  el.innerHTML = '<div class="empty-msg">Vista no encontrada.</div>';
}

/* ================= PANEL ================= */
function renderPanelView(el){
  var total = state.employees.length;
  var activos = 0, roansaCount = 0, spgCount = 0;
  var i;
  for(i=0;i<state.employees.length;i++){
    var e = state.employees[i];
    if(e.status === "Activo") activos++;
    if(e.empresa === "ROANSA") roansaCount++;
    if(e.empresa === "SPG") spgCount++;
  }

  var cumples = [];
  var aniversarios = [];
  var pendientes = [];
  for(i=0;i<state.employees.length;i++){
    var emp = state.employees[i];
    var dc = daysUntilNextOccurrence(emp.fecha_nacimiento);
    if(dc !== null && dc <= 30) cumples.push({ emp:emp, dias:dc });
    var da = daysUntilNextOccurrence(emp.fecha_ingreso);
    if(da !== null && da <= 30) aniversarios.push({ emp:emp, dias:da });
    var faltantes = 0;
    for(var docName in emp.documentos){ if(!emp.documentos[docName].recibido) faltantes++; }
    if(faltantes > 0) pendientes.push({ emp:emp, faltantes:faltantes });
  }
  cumples.sort(function(a,b){ return a.dias - b.dias; });
  aniversarios.sort(function(a,b){ return a.dias - b.dias; });

  var html = '';
  html += '<h1 class="view-title">Panel</h1>';
  html += '<p class="view-sub">Resumen general de recursos humanos &middot; ROANSA &amp; SPG</p>';

  html += '<div class="cards-grid">';
  html += '<div class="stat-card"><div class="num">'+total+'</div><div class="lbl">Total de empleados</div></div>';
  html += '<div class="stat-card"><div class="num">'+activos+'</div><div class="lbl">Activos</div></div>';
  html += '<div class="stat-card"><div class="num">'+roansaCount+'</div><div class="lbl">ROANSA</div></div>';
  html += '<div class="stat-card"><div class="num">'+spgCount+'</div><div class="lbl">SPG</div></div>';
  html += '</div>';

  html += '<div style="margin-bottom:22px;"><a class="btn secondary" href="'+DRIVE_URL+'" target="_blank" rel="noopener">Abrir carpeta de Drive</a></div>';

  html += '<div class="panel-cols">';

  html += '<div class="panel-box"><h3>Próximos cumpleaños (30 días)</h3>';
  if(cumples.length === 0){ html += '<div class="empty-msg">Sin cumpleaños próximos.</div>'; }
  else{
    for(i=0;i<cumples.length;i++){
      html += '<div class="list-row"><span>'+esc(cumples[i].emp.nombre)+'</span><span>en '+cumples[i].dias+' día(s)</span></div>';
    }
  }
  html += '</div>';

  html += '<div class="panel-box"><h3>Próximos aniversarios (30 días)</h3>';
  if(aniversarios.length === 0){ html += '<div class="empty-msg">Sin aniversarios próximos.</div>'; }
  else{
    for(i=0;i<aniversarios.length;i++){
      html += '<div class="list-row"><span>'+esc(aniversarios[i].emp.nombre)+'</span><span>en '+aniversarios[i].dias+' día(s)</span></div>';
    }
  }
  html += '</div>';

  html += '</div>';

  html += '<div class="panel-box"><h3>Expedientes con documentos pendientes</h3>';
  if(pendientes.length === 0){ html += '<div class="empty-msg">Todos los expedientes están completos.</div>'; }
  else{
    for(i=0;i<pendientes.length;i++){
      var p = pendientes[i];
      html += '<div class="list-row" style="cursor:pointer;" data-goto-ficha="'+p.emp.id+'"><span>'+esc(p.emp.nombre)+' <span class="pill '+(p.emp.empresa==="ROANSA"?"pill-roansa":"pill-spg")+'">'+p.emp.empresa+'</span></span><span class="pill pill-warn">'+p.faltantes+' pendiente(s)</span></div>';
    }
  }
  html += '</div>';

  el.innerHTML = html;
  var rows = el.querySelectorAll("[data-goto-ficha]");
  for(i=0;i<rows.length;i++){
    rows[i].addEventListener("click", function(){ switchView("ficha", this.getAttribute("data-goto-ficha")); });
  }
}

function renderEmpGrid(){
  var search = val("empSearch").toLowerCase();
  var fEmpresa = val("empFiltroEmpresa");
  var fArea = val("empFiltroArea");
  var fStatus = val("empFiltroStatus");
  var list = state.employees.filter(function(e){
    if(search && e.nombre.toLowerCase().indexOf(search) === -1) return false;
    if(fEmpresa && e.empresa !== fEmpresa) return false;
    if(fArea && e.area !== fArea) return false;
    if(fStatus && e.status !== fStatus) return false;
    return true;
  });
  var cont = byId("empGridContainer");
  if(!cont) return;
  if(list.length === 0){
    cont.innerHTML = '<div class="empty-msg">No se encontraron empleados con esos filtros.</div>';
    return;
  }
  var html = '<div class="emp-grid">';
  for(var i=0;i<list.length;i++){
    var e = list[i];
    var badgeClass = e.empresa === "ROANSA" ? "pill-roansa" : "pill-spg";
    html += '<div class="emp-card" data-goto-ficha="'+e.id+'">';
    html += '<span class="badge pill '+badgeClass+'">'+e.empresa+'</span>';
    if(e.foto){ html += '<img class="emp-photo" src="'+e.foto+'">'; }
    else{ html += '<div class="emp-photo-ph">'+esc((e.nombre||"?").charAt(0))+'</div>'; }
    html += '<div class="emp-name">'+esc(e.nombre)+'</div>';
    html += '<div class="emp-meta">'+esc(e.puesto)+' &middot; '+esc(e.area)+'</div>';
    html += '<div class="emp-meta"><span class="status-dot '+(e.status==="Activo"?"status-activo":"status-baja")+'"></span>'+e.status+'</div>';
    html += '</div>';
  }
  html += '</div>';
  cont.innerHTML = html;
  var cards = cont.querySelectorAll("[data-goto-ficha]");
  for(i=0;i<cards.length;i++){
    cards[i].addEventListener("click", function(){ switchView("ficha", this.getAttribute("data-goto-ficha")); });
  }
}

function dlItem(label, value){

function asignarFolio(e){
  var year = e.fecha_ingreso ? new Date(e.fecha_ingreso + "T00:00:00").getFullYear() : new Date().getFullYear();

  state.folioCounter++;
  saveState();
}

function wireAltaStep(el){
  var d = state.altaDraft;
  if(state.altaStep === 1){
    var opts = el.querySelectorAll("[data-empresa]");
    for(var i=0;i<opts.length;i++){
      opts[i].addEventListener("click", function(){
        captureStep1();
        state.altaDraft.empresa = this.getAttribute("data-empresa");
        renderAltaView(el);
      });
    }
    var fotoInput = byId("alta_foto");
    if(fotoInput){
      fotoInput.addEventListener("change", function(e){
        var file = e.target.files[0];
        if(!file) return;
        var reader = new FileReader();
        reader.onload = function(ev){
          state.altaDraft.foto = ev.target.result;
          byId("fotoPreviewBox").innerHTML = '<img src="'+ev.target.result+'" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">';
        };
        reader.readAsDataURL(file);
      });
    }
    var next1 = el.querySelector('[data-action="next1"]');
    if(next1){
      next1.addEventListener("click", function(){
        captureStep1();
        if(!state.altaDraft.empresa){ alert("Selecciona una empresa (ROANSA o SPG)."); return; }
        if(!state.altaDraft.nombre){ alert("Captura el nombre del empleado."); return; }
        state.altaStep = 2;
        renderAltaView(el);
      });
    }
  } else if(state.altaStep === 2){
    var fileInputs = el.querySelectorAll("[data-doc-file]");
    for(i=0;i<fileInputs.length;i++){
      fileInputs[i].addEventListener("change", function(e){
        var docName = this.getAttribute("data-doc-file");
        var file = e.target.files[0];
        if(!file) return;
        var reader = new FileReader();
        reader.onload = function(ev){
          d.documentos[docName].recibido = true;
          d.documentos[docName].archivo = ev.target.result;
          d.documentos[docName].nombreArchivo = file.name;
          downloadDataUrl(file.name, ev.target.result);
          updateDocRowUI(docName);
        };
        reader.readAsDataURL(file);
      });
    }
    var checks = el.querySelectorAll("[data-doc-check]");
    for(i=0;i<checks.length;i++){
      checks[i].addEventListener("change", function(){
        var docName = this.getAttribute("data-doc-check");
        d.documentos[docName].recibido = this.checked;
        if(!this.checked){ d.documentos[docName].archivo = null; d.documentos[docName].nombreArchivo = ""; }
        updateDocRowUI(docName);
      });
    }
    el.querySelector('[data-action="back2"]').addEventListener("click", function(){ state.altaStep = 1; renderAltaView(el); });
    el.querySelector('[data-action="next2"]').addEventListener("click", function(){ state.altaStep = 3; renderAltaView(el); });
  } else if(state.altaStep === 3){
    el.querySelector('[data-action="back3"]').addEventListener("click", function(){ state.altaStep = 2; renderAltaView(el); });
    el.querySelector('[data-action="guardar"]').addEventListener("click", function(){
      var nuevo = JSON.parse(JSON.stringify(state.altaDraft));
      nuevo.id = uid();
      nuevo.folio = "";
      nuevo.fecha_contrato = "";
      nuevo.contratoTexto = "";
      nuevo.id_contrato = "";
      state.employees.push(nuevo);
      saveState();
      state.altaDraft = null;
      state.altaStep = 1;
      switchView("ficha", nuevo.id);
    });
  }
}
function updateDocRowUI(docName){
  var d = state.altaDraft;
  var info = d.documentos[docName];
  var tag = document.querySelector('[data-doc-tag="'+cssEscape(docName)+'"]');
  if(tag){
    tag.className = "doc-status-tag " + (info.recibido ? "tag-recibido" : "tag-pendiente");
    tag.textContent = (info.recibido ? "Recibido" : "Pendiente") + (info.nombreArchivo ? (" · " + info.nombreArchivo) : "");
  }
}
function cssEscape(s){ return String(s).replace(/["\\]/g, "\\$&"); }
function downloadDataUrl(filename, dataUrl){
  try{
    var a = document.createElement("a");
    a.href = dataUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }catch(e){ console.warn("No se pudo iniciar la descarga", e); }
}

/* ================= CONTRATO ================= */
function buildContractVars(e, fechaContrato){
  var fc = fechaContrato || e.fecha_contrato || new Date().toISOString().slice(0,10);
  var fcDate = new Date(fc + "T00:00:00");
  var idc = e.id_contrato || ((e.empresa === "ROANSA" ? "CTR-ROA-" : "CTR-SPG-") + fcDate.getFullYear() + "-" + String(state.contratoCounter).padStart(4,"0"));
  var emp = EMPRESAS[e.empresa];
  return {
    nombre: e.nombre, curp: e.curp, rfc: e.rfc, nss: e.nss, puesto: e.puesto, area: e.area,
    contrato: "INDETERMINADO",
    fecha_ingreso: fmtDate(e.fecha_ingreso), fecha_contrato: fmtDate(fc), fecha_nacimiento: fmtDate(e.fecha_nacimiento),
    edad: calcEdad(e.fecha_nacimiento), nacionalidad: e.nacionalidad, estado_civil: e.estado_civil,
    calle: e.calle, no_exterior: e.no_exterior, colonia: e.colonia, cp: e.cp, estado: e.estado, pais: e.pais,
    salario_mensual: money(e.salario_mensual), salario_diario: money(e.salario_diario),
    dia: fcDate.getDate(), mes: MESES_ES[fcDate.getMonth()], id_contrato: idc,
    empresa_nombre: emp.nombre, empresa_rfc: emp.rfc, empresa_imss: emp.imss, empresa_stps: emp.stps,
    empresa_escritura: emp.escritura, empresa_direccion: DIRECCION_FISCAL, representante: REPRESENTANTE
  };
}
function fillTemplate(text, vars){
  var out = text;
  for(var key in vars){
    var token = "{{" + key + "}}";
    var value = vars[key] === undefined || vars[key] === null ? "" : String(vars[key]);
    out = out.split(token).join(value);
  }
  return out;
}
function renderContratoView(el, id){
  var e = findEmployee(id);
  if(!e){ el.innerHTML = '<div class="empty-msg">Empleado no encontrado.</div>'; return; }
  var machote = state.machotes[e.empresa];
  var html = '<a class="back-link" data-nav="ficha">&larr; Volver a la ficha</a>';
  html += '<h1 class="view-title">Contrato &middot; '+esc(e.nombre)+' <span class="pill '+(e.empresa==="ROANSA"?"pill-roansa":"pill-spg")+'">'+e.empresa+'</span></h1>';
  if(!machote){
    html += '<div class="note-box">No hay un machote configurado para '+e.empresa+'. Ve a la sección Machotes para subir o cargar uno de ejemplo.</div>';
    html += '<button class="btn secondary" data-action="ir-machotes">Ir a Machotes</button>';
    el.innerHTML = html;
    el.querySelector('[data-nav="ficha"]').addEventListener("click", function(){ switchView("ficha", e.id); });
    el.querySelector('[data-action="ir-machotes"]').addEventListener("click", function(){ switchView("machotes"); });
    return;
  }
  html += '<div class="form-field" style="max-width:220px;margin-bottom:16px;"><label>Fecha del contrato</label>';
  html += '<input type="date" id="fechaContratoInput" value="'+esc(e.fecha_contrato || new Date().toISOString().slice(0,10))+'"></div>';
  html += '<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;">';
  html += '<button class="btn secondary" data-action="generar">Generar contrato</button>';
  html += '<button class="btn" data-action="imprimir" '+(e.contratoTexto?"":"disabled")+'>Imprimir contrato</button>';
  html += '<button class="btn blue" data-action="guardar-contrato" '+(e.contratoTexto?"":"disabled")+'>Guardar en expediente</button>';
  html += '</div>';
  html += '<div class="contract-preview" id="contratoPreview">' + (e.contratoTexto ? esc(e.contratoTexto) : "Presiona \"Generar contrato\" para ver la vista previa.") + '</div>';
  el.innerHTML = html;

  el.querySelector('[data-nav="ficha"]').addEventListener("click", function(){ switchView("ficha", e.id); });
  el.querySelector('[data-action="generar"]').addEventListener("click", function(){
    var fc = val("fechaContratoInput");
    var vars = buildContractVars(e, fc);
    var texto = fillTemplate(machote, vars);
    byId("contratoPreview").textContent = texto;
    e._tmpContrato = texto;
    e._tmpVars = vars;
    var impBtn = el.querySelector('[data-action="imprimir"]');
    var guardarBtn = el.querySelector('[data-action="guardar-contrato"]');
    impBtn.removeAttribute("disabled");
    guardarBtn.removeAttribute("disabled");
  });
  el.querySelector('[data-action="imprimir"]').addEventListener("click", function(){
    var texto = e._tmpContrato || e.contratoTexto;
    if(!texto) return;
    var body = '<div style="white-space:pre-wrap;font-family:Segoe UI,Arial,sans-serif;font-size:13px;line-height:1.7;padding:30px;">' + esc(texto) + '</div>';
    openPrintWindow("Contrato - " + e.nombre, body, "");
  });
  el.querySelector('[data-action="guardar-contrato"]').addEventListener("click", function(){
    if(!e._tmpContrato) return;
    e.contratoTexto = e._tmpContrato;
    e.fecha_contrato = val("fechaContratoInput");
    e.id_contrato = e._tmpVars.id_contrato;
    state.contratoCounter++;
    saveState();
    alert("Contrato guardado en el expediente del empleado.");
  });
}

/* ================= MACHOTES ================= */
function renderMachotesView(el){
  var html = '<h1 class="view-title">Machotes de contrato</h1>';
  html += '<p class="view-sub">Sube un archivo .txt con el machote de cada empresa, o carga un ejemplo para empezar.</p>';
  html += '<div class="machote-cols">';
  html += machoteBoxHTML("ROANSA", "roansa");
  html += machoteBoxHTML("SPG", "spg");
  html += '</div>';
  html += '<div class="vars-legend"><strong>Variables disponibles:</strong><br>';
  var vars = ["nombre","curp","rfc","nss","puesto","area","contrato","fecha_ingreso","fecha_contrato","fecha_nacimiento","edad","nacionalidad","estado_civil","calle","no_exterior","colonia","cp","estado","pais","salario_mensual","salario_diario","dia","mes","id_contrato"];
  for(var i=0;i<vars.length;i++){ html += '<code>{{'+vars[i]+'}}</code>'; }
  html += '</div>';
  el.innerHTML = html;

  wireMachoteBox("ROANSA");
  wireMachoteBox("SPG");
}
function machoteBoxHTML(empresa, cls){
  var color = EMPRESAS[empresa].color;
  var texto = state.machotes[empresa] || "";
  var html = '<div class="machote-box '+cls+'">';
  html += '<h3 style="color:'+color+';">'+(empresa==="ROANSA" ? "&#128308; " : "&#128309; ")+'Contrato '+empresa+'</h3>';
  html += '<input type="file" id="machoteFile_'+empresa+'" accept=".txt">';
  html += '<div style="margin:10px 0;">';
  html += '<button class="btn small secondary" data-machote-ejemplo="'+empresa+'">Cargar ejemplo</button> ';
  html += '<button class="btn small" data-machote-guardar="'+empresa+'">Guardar machote</button>';
  html += '</div>';
  html += '<textarea id="machoteText_'+empresa+'">'+esc(texto)+'</textarea>';
  html += '</div>';
  return html;
}
function wireMachoteBox(empresa){
  byId("machoteFile_" + empresa).addEventListener("change", function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){ byId("machoteText_" + empresa).value = ev.target.result; };
    reader.readAsText(file);
  });
  document.querySelector('[data-machote-ejemplo="'+empresa+'"]').addEventListener("click", function(){
    byId("machoteText_" + empresa).value = EJEMPLO_MACHOTE;
  });
  document.querySelector('[data-machote-guardar="'+empresa+'"]').addEventListener("click", function(){
    state.machotes[empresa] = byId("machoteText_" + empresa).value;
    saveState();
    alert("Machote de " + empresa + " guardado.");
  });
}

/* ================= IMPRESIÓN ================= */
function openPrintWindow(title, bodyHtml, extraCss){
  var w = window.open("", "_blank", "width=900,height=700");
  if(!w){ alert("Permite las ventanas emergentes para poder imprimir."); return; }
  var css = "body{margin:0;padding:0;} " + (extraCss || "");
  var doc = w.document;
  doc.open();
  doc.write("<!DOCTYPE html><html><head><title>" + esc(title) + "</title><meta charset='UTF-8'><style>" + css + "</style></head><body>" + bodyHtml + "</body></html>");
  doc.close();
  w.focus();
  setTimeout(function(){ w.print(); }, 350);
}
