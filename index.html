<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Inter,sans-serif;background:#F3F4F6;color:#111;min-height:100vh}
:root{--red:#C0112B;--red2:#A31820;--red-light:#F9E5E8;--black:#111;--gray7:#444;--gray4:#9CA3AF;--gray2:#E5E7EB;--gray1:#F3F4F6}
#app{display:flex;min-height:100vh}
#sidebar{width:210px;min-width:210px;background:var(--black);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
#main{flex:1;padding:24px 28px;overflow-y:auto}
.sidebar-logo{padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo-inner{background:#fff;border-radius:8px;padding:8px;display:block}
.sidebar-logo-inner img{width:100%;display:block}
.sidebar-sub{font-size:9px;color:#444;letter-spacing:1px;text-transform:uppercase;text-align:center;padding:7px 0 10px;border-bottom:1px solid rgba(255,255,255,.08)}
nav{padding:12px 10px;display:flex;flex-direction:column;gap:2px;flex:1}
.nav-sec{font-size:9px;font-weight:800;color:#333;letter-spacing:1.2px;text-transform:uppercase;padding:10px 11px 4px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:7px;border:none;background:transparent;color:var(--gray4);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;width:100%}
.nav-btn.active{background:rgba(192,17,43,.2);color:#ff6b7a}
.nav-btn:hover:not(.active){background:rgba(255,255,255,.05);color:#ccc}
.sidebar-foot{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:#444}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.topbar h1{font-size:20px;font-weight:900;color:var(--black)}
.topbar-sub{font-size:11px;color:var(--gray4);margin-top:2px}
.btn{padding:8px 18px;border-radius:7px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s;text-decoration:none}
.btn:hover{opacity:.82}
.btn-primary{background:var(--red);color:#fff}
.btn-secondary{background:#fff;color:var(--gray7);border:1.5px solid var(--gray2)}
.btn-ghost{background:transparent;color:var(--gray7);border:none}
.btn-danger{background:#fff;color:var(--red);border:1.5px solid var(--red)}
.btn-green{background:#166534;color:#fff}
.btn-drive{background:#1967D2;color:#fff}
.btn-roansa{background:var(--red);color:#fff}
.btn-spg{background:#1967D2;color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.badge{padding:2px 9px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;display:inline-block;white-space:nowrap}
.badge-green{background:#DCFCE7;color:#166534}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-yellow{background:#FEF9C3;color:#92400E}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
.badge-gray{background:var(--gray1);color:var(--gray7)}
.badge-roansa{background:var(--red-light);color:var(--red2)}
.badge-spg{background:#E8F0FE;color:#1967D2}
.avatar{border-radius:50%;background:linear-gradient(135deg,var(--red) 0%,var(--red2) 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:16px 18px}
.stat-card.accent{border-left:4px solid var(--red)}
.stat-val{font-size:28px;font-weight:900;line-height:1;color:var(--black)}
.stat-card.accent .stat-val{color:var(--red)}
.stat-label{font-size:11px;font-weight:700;color:var(--gray7);margin-top:4px}
.alert-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.alert-box{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:16px}
.alert-title{font-weight:800;font-size:13px;color:var(--black);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.alert-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray1)}
.alert-row:last-child{border-bottom:none}
.emp-list{display:flex;flex-direction:column;gap:9px}
.emp-card{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:13px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border .15s,box-shadow .15s}
.emp-card:hover{border-color:var(--red);box-shadow:0 2px 14px rgba(192,17,43,.1)}
.emp-name{font-weight:800;font-size:14px;color:var(--black)}
.emp-sub{font-size:11px;color:var(--gray4);margin-top:1px}
.emp-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.search-bar{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-bar input,.search-bar select{padding:8px 11px;border:1.5px solid var(--gray2);border-radius:7px;font-family:inherit;font-size:12px;color:var(--black);background:#fff;outline:none}
.search-bar input{flex:1;min-width:160px}
.hero-card{background:linear-gradient(135deg,#111 0%,#1C1C1C 100%);border-radius:13px;padding:22px 26px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:16px}
.hero-name{font-size:20px;font-weight:900;color:#fff;line-height:1.1}
.hero-sub{font-size:12px;color:var(--gray4);margin-top:3px}
.hero-badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.section-box{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:16px 18px}
.section-title{font-size:10px;font-weight:800;color:var(--red);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--gray1);padding-bottom:7px;margin-bottom:10px}
.data-row{display:grid;grid-template-columns:140px 1fr;gap:6px;align-items:start;margin-bottom:7px}
.data-label{font-size:11px;color:var(--gray4);font-weight:600}
.data-val{font-size:12px;color:var(--black);font-weight:600;word-break:break-all}
.alert-banner{background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:9px;padding:11px 15px;display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:#92400E}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;z-index:100;overflow-y:auto;padding:32px 12px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:740px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:17px;font-weight:900;color:var(--black)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray4)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:10px;font-weight:800;color:var(--gray7);letter-spacing:.4px;text-transform:uppercase}
.field input,.field select,.field textarea{padding:9px 12px;border:1.5px solid var(--gray2);border-radius:7px;font-family:inherit;font-size:13px;color:var(--black);background:#fff;outline:none;width:100%;transition:border .15s}
.field input:focus,.field select:focus{border-color:var(--red)}
.field textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--gray2)}
.fs-title{font-size:10px;font-weight:800;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--gray1)}
.doc-toggle{padding:6px 13px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;transition:all .1s;border:1.5px solid}
.doc-toggle.checked{background:#DCFCE7;color:#166534;border-color:#BBF7D0}
.doc-toggle.unchecked{background:var(--gray1);color:var(--gray7);border-color:var(--gray2)}
.steps{display:flex;margin-bottom:22px;background:#fff;border:1.5px solid var(--gray2);border-radius:11px;overflow:hidden}
.step{flex:1;padding:13px 8px;text-align:center;border-right:1px solid var(--gray2);cursor:pointer;transition:background .15s}
.step:last-child{border-right:none}
.step.active{background:var(--red);color:#fff}
.step.done{background:#DCFCE7;color:#166534}
.step-num{font-size:16px;font-weight:900;line-height:1}
.step-lbl{font-size:9px;font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.5px;opacity:.85}
.photo-zone{border:2.5px dashed var(--gray2);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .15s;background:#fafafa}
.photo-zone:hover{border-color:var(--red);background:var(--red-light)}
.doc-upload-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;border:1.5px solid var(--gray2);background:#fff;margin-bottom:8px}
.doc-upload-row.has-file{border-color:#BBF7D0;background:#F0FDF4}
.alta-content{background:#fff;border:1.5px solid var(--gray2);border-radius:12px;padding:24px}
/* Empresa selector */
.empresa-sel{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.empresa-card{border:2.5px solid var(--gray2);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all .15s}
.empresa-card:hover{border-color:var(--red)}
.empresa-card.selected-roansa{border-color:var(--red);background:var(--red-light)}
.empresa-card.selected-spg{border-color:#1967D2;background:#E8F0FE}
.empresa-card .ec-name{font-size:15px;font-weight:900;margin-top:8px}
.empresa-card .ec-sub{font-size:10px;color:var(--gray4);margin-top:3px}
/* Credencial */
.cred-pair{display:flex;gap:14px;flex-wrap:wrap}
.cred-front{width:240px;min-height:380px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.2);display:flex;flex-direction:column}
.cf-top{background:#fff;padding:12px 14px 0;display:flex;align-items:center;gap:8px}
.cf-roansa{font-size:13px;font-weight:900;color:var(--red2);letter-spacing:.5px}
.cf-seg{font-size:7px;color:#666;letter-spacing:1.5px;text-transform:uppercase;margin-top:-1px}
.cf-empresa-line{font-size:6.5px;color:#333;font-weight:700;text-align:center;padding:6px 12px 0;line-height:1.4;text-transform:uppercase}
.cf-photo-wrap{position:relative;margin:8px 14px 0;overflow:hidden}
.cf-photo-overlay{position:absolute;bottom:0;right:0;width:55%;height:100%;background:linear-gradient(to left,var(--red2) 0%,transparent 100%);pointer-events:none}
.cf-name{background:#fff;text-align:center;padding:8px 10px 4px;font-size:12px;font-weight:900;color:#111;line-height:1.2;text-transform:uppercase}
.cf-bottom{background:var(--red2);margin-top:auto;padding:10px;text-align:center}
.cf-puesto{color:#fff;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;line-height:1.3}
.cred-back{width:240px;min-height:380px;border-radius:10px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.2);display:flex;flex-direction:column}
.cb-top{background:var(--red2);padding:10px 14px;text-align:center}
.cb-folio{font-size:11px;font-weight:900;color:#fff;letter-spacing:.5px}
.cb-vigencia{font-size:10px;font-weight:700;color:rgba(255,255,255,.8);margin-top:1px}
.cb-body{background:#fff;flex:1;padding:16px;display:flex;flex-direction:column;align-items:center}
.cb-sig-area{width:100%;height:72px;border-bottom:1.5px solid #ccc;margin-bottom:5px}
.cb-sig-label{font-size:8px;color:#888;text-align:center;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.cb-coord{font-size:10px;font-weight:800;color:#111;text-align:center;text-transform:uppercase;line-height:1.4;margin-bottom:12px}
.cb-permiso,.cb-exp{font-size:9px;color:#555;text-align:center;line-height:1.5}
.cb-bottom{background:var(--red2);padding:9px 12px}
.cb-address{font-size:8px;color:rgba(255,255,255,.9);text-align:center;line-height:1.5}
/* Template */
.template-zone{border:2.5px dashed var(--gray2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .15s}
.template-zone:hover{border-color:var(--red);background:var(--red-light)}
.template-loaded{background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:10px}
.contract-preview{background:#fffef5;border:1px solid #e8e3c0;border-radius:8px;padding:16px 20px;font-size:11px;line-height:1.8;color:#333;max-height:240px;overflow-y:auto;white-space:pre-wrap;font-family:monospace}
.var-chip{display:inline-block;background:#EDE9FE;color:#6D28D9;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;font-family:monospace;margin:2px}
.count-note{font-size:11px;color:var(--gray4);margin-bottom:10px}
</style>
</head>

function av(name,sz,foto){sz=sz||42;if(foto)return`<div class="avatar" style="width:${sz}px;height:${sz}px;overflow:hidden;border-radius:50%"><img src="${foto}" style="width:100%;height:100%;object-fit:cover"></div>`;return`<div class="avatar" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.36)}px">${initials(name)}</div>`;}
function bdg(text,color){return`<span class="badge badge-${color||'gray'}">${text}</span>`;}
function empresaBadge(emp){return bdg(emp||'ROANSA',emp==='SPG'?'spg':'roansa');}

function showView(v,id){
  currentView=v;if(id!=null)selectedId=id;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nav-'+(v==='detail'?'list':v));
  if(nb)nb.classList.add('active');
  ['dashboard','list','detail','alta','templates'].forEach(x=>document.getElementById('view-'+x).style.display='none');
  document.getElementById('view-'+v).style.display='block';
  ({dashboard:renderDashboard,list:renderList,detail:renderDetail,alta:renderAlta,templates:renderTemplates}[v]||function(){})();
  updateSidebar();
}
function updateSidebar(){
  const n=employees.filter(e=>e.status==='Activo').length;
  document.getElementById('sidebar-count').textContent=`${n} empleado${n!==1?'s':''} activo${n!==1?'s':''}`;
}

// ── LISTA ───────────────────────────────────────────────────────────
function renderList(){
  const filtered=employees.filter(e=>{
    const q=searchQ.toLowerCase();
    return(!q||e.nombre.toLowerCase().includes(q)||e.puesto.toLowerCase().includes(q)||(e.email||'').toLowerCase().includes(q))
      &&(!filterArea||e.area===filterArea)&&(!filterStatus||e.status===filterStatus)&&(!filterEmpresa||e.empresa===filterEmpresa);
  });
  let h=`<div class="topbar"><div><h1>Directorio de Empleados</h1><div class="topbar-sub">${employees.length} empleados · ${employees.filter(e=>e.empresa==='ROANSA').length} ROANSA · ${employees.filter(e=>e.empresa==='SPG').length} SPG</div></div><button class="btn btn-primary" onclick="showView('alta')">➕ Dar de alta</button></div>`;

    <select onchange="filterArea=this.value;renderList()"><option value="">Todas las áreas</option>${AREAS.map(a=>`<option value="${a}"${filterArea===a?' selected':''}>${a}</option>`).join('')}</select>
    <select onchange="filterStatus=this.value;renderList()"><option value="">Todos</option>${['Activo','Inactivo','Baja'].map(s=>`<option value="${s}"${filterStatus===s?' selected':''}>${s}</option>`).join('')}</select>
  </div>`;
  h+=`<div class="count-note">${filtered.length} empleado${filtered.length!==1?'s':''} encontrado${filtered.length!==1?'s':''}</div><div class="emp-list">`;

  filtered.forEach(e=>{

// ── DOCS MODAL ────────────────────────────────────────────────────
function openDocsModal(empId){
  const e=employees.find(x=>x.id===empId);if(!e)return;
  const rows=DOCS.map(doc=>{
    const df=e.driveFiles&&e.driveFiles[doc],tiene=e.documentos.includes(doc),safe=doc.replace(/\s+/g,'_');
    return`<div class="doc-upload-row ${df?'has-file':''}" id="drow-${empId}-${safe}">
      <div style="font-size:18px;width:26px;text-align:center">${df?'✅':tiene?'📄':'📋'}</div>
      <div style="flex:1"><div style="font-size:12px;font-weight:700;color:${df?'#166534':'var(--black)'}">${doc}</div><div style="font-size:10px;color:var(--gray4)">${df&&df.url!=='local'?`<a href="${df.url}" target="_blank" style="color:#1967D2;font-weight:700">📁 Ver en Drive</a>`:tiene?'Marcado como recibido':'Sin documento'}</div></div>
      <div><input type="file" id="dfile-${empId}-${safe}" accept="image/*,.pdf" style="display:none" onchange="uploadDoc(${empId},'${doc}',this)">
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('dfile-${empId}-${safe}').click()">${df?'🔄':'⬆️'} ${df?'Cambiar':'Subir'}</button></div>
    </div>`;
  }).join('');
  document.getElementById('modal-inner').innerHTML=`
  <div class="modal-header"><div class="modal-title">📁 Expediente en Drive — ${esc(e.nombre)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div style="font-size:11px;color:var(--gray4);margin-bottom:14px">Archivos en <strong>ROANSA RH / ${esc(e.nombre)}</strong> en Google Drive</div>
  <div>${rows}</div>
  <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button><a href="${DRIVE_URL}" target="_blank" class="btn btn-drive btn-sm">📁 Abrir Drive</a></div>`;
  document.getElementById('modal').style.display='flex';
}

function uploadDoc(empId,docName,input){
  const file=input.files[0];if(!file)return;
  const e=employees.find(x=>x.id===empId);if(!e)return;
  const safe=docName.replace(/\s+/g,'_'),row=document.getElementById(`drow-${empId}-${safe}`);
  const reader=new FileReader();
  reader.onload=ev=>{
    if(!e.driveFiles)e.driveFiles={};
    e.driveFiles[docName]={url:'local',name:file.name,localData:ev.target.result};
    if(!e.documentos.includes(docName))e.documentos.push(docName);
    if(row){row.className='doc-upload-row has-file';row.querySelector('div:first-child').textContent='✅';row.querySelector('[style*="color:"]').textContent=docName;row.querySelector('[style*="gray4"]').textContent='Guardado en la app';}
    // download for Drive
    const a=document.createElement('a');a.href=ev.target.result;a.download=`${docName}_${e.nombre.replace(/\s+/g,'_')}.${file.name.split('.').pop()}`;document.body.appendChild(a);a.click();document.body.removeChild(a);
    showToast(`✅ ${docName} descargado. Súbelo a tu carpeta en Drive.`);
    if(currentView==='detail')renderDetail();
  };
  reader.readAsDataURL(file);
}

function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;right:24px;background:#1C1C1C;color:#fff;padding:14px 18px;border-radius:10px;font-size:12px;z-index:999;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.3);line-height:1.5';
  t.innerHTML=msg+`<br><a href="${DRIVE_URL}" target="_blank" style="color:#60a5fa;font-weight:700;text-decoration:none">Abrir Drive →</a>`;
  document.body.appendChild(t);setTimeout(()=>t.remove(),7000);
}

function handleFotoAlta(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{altaData.foto=ev.target.result;renderAlta();};r.readAsDataURL(f);}
function handleAltaDoc(docName,input){
  const file=input.files[0];if(!file)return;
  if(!altaData.docFiles)altaData.docFiles={};
  altaData.docFiles[docName]=file;
  if(!altaData.documentos.includes(docName))altaData.documentos.push(docName);
  const safe=docName.replace(/\s+/g,'_'),row=document.getElementById('alta-drow-'+safe);
  if(row){row.className='doc-upload-row has-file';row.querySelector('div:first-child').textContent='✅';row.querySelector('[style*="font-size:12px"]').textContent=docName;row.querySelector('[style*="gray4"]').textContent=file.name;}
}
function markAltaDoc(docName){
  if(!altaData.documentos.includes(docName))altaData.documentos.push(docName);
  const safe=docName.replace(/\s+/g,'_'),row=document.getElementById('alta-drow-'+safe);
  if(row){row.className='doc-upload-row has-file';row.querySelector('div:first-child').textContent='✅';row.querySelector('[style*="gray4"]').textContent='Marcado como recibido';}
}
function altaGuardarPaso2(){
  const nombre=gv('a-nombre');if(!nombre){alert('El nombre es requerido.');return;}
  const puesto=gv('a-puesto'),area=gv('a-area'),ing=gv('a-ing');

async function altaGuardarPaso3(){
  const docs=Object.keys(altaData.docFiles||{}).concat((altaData.documentos||[]).filter(d=>!(altaData.docFiles||{})[d]));
  altaData.documentos=[...new Set(docs)];
  const newEmp={...altaData,id:Date.now(),documentos:altaData.documentos,driveFiles:{},folderId:null};
  delete newEmp._saved;delete newEmp.docFiles;
  employees.push(newEmp);
  altaData._saved=newEmp;
  if(altaData.docFiles){
    for(const[doc,file] of Object.entries(altaData.docFiles)){
      const dataUrl=await new Promise(r=>{const rd=new FileReader();rd.onload=e=>r(e.target.result);rd.readAsDataURL(file);});
      const a=document.createElement('a');a.href=dataUrl;a.download=`${doc}_${newEmp.nombre.replace(/\s+/g,'_')}.${file.name.split('.').pop()}`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      await new Promise(r=>setTimeout(r,350));
    }
  }
  updateSidebar();altaStep=4;renderAlta();
}

function generateContract(id){
  const e=employees.find(x=>x.id===id);if(!e)return;
  const tmpl=e.empresa==='SPG'?contractSPG:contractROANSA;
  if(!tmpl){alert(`No hay machote de ${e.empresa} cargado. Ve a la sección Machotes.`);return;}
  const today=new Date(),d=String(today.getDate()).padStart(2,'0'),mes=MESES[today.getMonth()];
  const filled=tmpl
    .replace(/\{\{nombre\}\}/g,e.nombre||'')
    .replace(/\{\{nombres\}\}/g,e.nombres||e.nombre||'')
    .replace(/\{\{apellidos\}\}/g,e.apellidos||'')
    .replace(/\{\{curp\}\}/g,e.curp||'')
    .replace(/\{\{rfc\}\}/g,e.rfc||'')
    .replace(/\{\{nss\}\}/g,e.nss||'')
    .replace(/\{\{puesto\}\}/g,e.puesto||'')
    .replace(/\{\{area\}\}/g,e.area||'')
    .replace(/\{\{contrato\}\}/g,e.contrato||'')
    .replace(/\{\{fecha_ingreso\}\}/g,fmtDateLong(e.fechaIngreso))
    .replace(/\{\{fecha_contrato\}\}/g,fmtDateLong(todayStr()))
    .replace(/\{\{fecha_nacimiento\}\}/g,fmtDateLong(e.fechaNacimiento))
    .replace(/\{\{edad\}\}/g,calcAge(e.fechaNacimiento)||'')
    .replace(/\{\{nacionalidad\}\}/g,e.nacionalidad||'Mexicana')
    .replace(/\{\{estado_civil\}\}/g,e.estadoCivil||'')
    .replace(/\{\{tipo_identificacion\}\}/g,e.tipo_identificacion||'INE')
    .replace(/\{\{no_identificacion\}\}/g,e.no_identificacion||'')
    .replace(/\{\{calle\}\}/g,e.calle||'')
    .replace(/\{\{no_exterior\}\}/g,e.no_exterior||'')
    .replace(/\{\{no_interior\}\}/g,e.no_interior||'')
    .replace(/\{\{colonia\}\}/g,e.colonia||'')
    .replace(/\{\{cp\}\}/g,e.cp||'')
    .replace(/\{\{estado\}\}/g,e.estado||'')
    .replace(/\{\{pais\}\}/g,e.pais||'México')
    .replace(/\{\{salario_mensual\}\}/g,e.salarioMensual||'9451.20')
    .replace(/\{\{salario_diario\}\}/g,e.salarioDiario||'315.04')
    .replace(/\{\{salario_mensual_letra\}\}/g,'')
    .replace(/\{\{salario_diario_letra\}\}/g,'')
    .replace(/\{\{dia\}\}/g,d)
    .replace(/\{\{mes\}\}/g,mes)
    .replace(/\{\{id_contrato\}\}/g,'CTRO-'+String(e.id).slice(-6));
  const blob=new Blob([filled],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`Contrato_${e.empresa}_${e.nombre.replace(/\s+/g,'_')}.txt`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

async function handleContractFile(e,empresa){const f=e.target.files[0];if(!f)return;const t=await f.text();if(empresa==='ROANSA')contractROANSA=t;else contractSPG=t;renderTemplates();}
async function handleContractDrop(e,empresa){e.preventDefault();const f=e.dataTransfer.files[0];if(!f)return;const t=await f.text();if(empresa==='ROANSA')contractROANSA=t;else contractSPG=t;renderTemplates();}

// ── MODAL EDICIÓN ─────────────────────────────────────────────────
function openEditModal(id){
  editingId=id;const e=employees.find(x=>x.id===id)||{};
  const docBtns=DOCS.map(d=>{const c=e.documentos&&e.documentos.includes(d);return`<button type="button" class="doc-toggle ${c?'checked':'unchecked'}" data-doc="${d}" onclick="toggleDoc(this,'${d}')">${c?'✓':'○'} ${d}</button>`;}).join('');
  document.getElementById('modal-inner').innerHTML=`
  <div class="modal-header"><div class="modal-title">✏️ Editar — ${esc(e.nombre)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="fs-title">Empresa</div>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <button id="ebtn-roansa" class="btn ${(e.empresa||'ROANSA')==='ROANSA'?'btn-roansa':'btn-secondary'}" onclick="document.getElementById('f-empresa').value='ROANSA';document.getElementById('ebtn-roansa').className='btn btn-roansa';document.getElementById('ebtn-spg').className='btn btn-secondary'">🔴 ROANSA</button>

    <input type="hidden" id="f-empresa" value="${esc(e.empresa||'ROANSA')}">
  </div>
  <div class="fs-title">Datos personales</div>
  <div class="form-grid" style="gap:9px;margin-bottom:14px">
    <div class="field" style="grid-column:1/-1"><label class="field-label">Nombre *</label><input id="f-nombre" value="${esc(e.nombre)}"></div>
    <div class="field"><label class="field-label">Fecha nacimiento</label><input id="f-nac" type="date" value="${esc(e.fechaNacimiento)}"></div>
    <div class="field"><label class="field-label">Estado civil</label><select id="f-ecivil"><option value="">—</option>${['Soltero/a','Casado/a','Unión libre','Divorciado/a','Viudo/a'].map(s=>`<option${e.estadoCivil===s?' selected':''}>${s}</option>`).join('')}</select></div>
    <div class="field"><label class="field-label">Nacionalidad</label><input id="f-nac2" value="${esc(e.nacionalidad||'Mexicana')}"></div>

    <div class="field"><label class="field-label">CURP</label><input id="f-curp" value="${esc(e.curp)}"></div>
    <div class="field"><label class="field-label">RFC</label><input id="f-rfc" value="${esc(e.rfc)}"></div>
    <div class="field"><label class="field-label">NSS</label><input id="f-nss" value="${esc(e.nss)}"></div>
    <div class="field"><label class="field-label">Correo</label><input id="f-email" type="email" value="${esc(e.email)}"></div>
  </div>
  <div class="fs-title">Domicilio</div>
  <div class="form-grid" style="gap:9px;margin-bottom:14px">
    <div class="field"><label class="field-label">Calle</label><input id="f-calle" value="${esc(e.calle||'')}"></div>

function toggleDoc(btn,doc){const c=btn.classList.contains('checked');btn.classList.toggle('checked',!c);btn.classList.toggle('unchecked',c);btn.textContent=(c?'○':'✓')+' '+doc;}
function saveEdit(){
  const nombre=gv('f-nombre');if(!nombre){alert('Nombre requerido.');return;}
  const docs=[...document.querySelectorAll('#doc-btns .doc-toggle.checked')].map(b=>b.dataset.doc);
  const i=employees.findIndex(e=>e.id===editingId);
  if(i>-1)employees[i]={...employees[i],nombre,empresa:gv('f-empresa')||'ROANSA',puesto:gv('f-puesto'),area:gv('f-area'),
    telefono:gv('f-tel'),email:gv('f-email'),curp:gv('f-curp'),rfc:gv('f-rfc'),nss:gv('f-nss'),
    estadoCivil:gv('f-ecivil'),nacionalidad:gv('f-nac2'),
    calle:gv('f-calle'),no_exterior:gv('f-next'),colonia:gv('f-col'),cp:gv('f-cp'),estado:gv('f-est'),
    fechaNacimiento:gv('f-nac'),fechaIngreso:gv('f-ing'),status:gv('f-status'),contrato:gv('f-contrato'),
    salarioMensual:gv('f-salmen'),salarioDiario:gv('f-saldia'),notas:gv('f-notas'),documentos:docs};
  closeModal();renderDetail();updateSidebar();
}
function deleteEmp(id){const e=employees.find(x=>x.id===id);if(!confirm(`¿Eliminar expediente de ${e.nombre}?`))return;employees=employees.filter(x=>x.id!==id);showView('list');}
function closeModal(){document.getElementById('modal').style.display='none';}

showView('dashboard');
</script>
