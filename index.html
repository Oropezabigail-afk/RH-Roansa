<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ROANSA · RH Expedientes</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Inter,sans-serif;background:#F3F4F6;color:#111;min-height:100vh}
:root{--red:#C0112B;--red-dark:#8B0D1F;--red-light:#F9E5E8;--black:#111;--gray9:#1C1C1C;--gray7:#444;--gray4:#9CA3AF;--gray2:#E5E7EB;--gray1:#F3F4F6;--white:#fff}
#app{display:flex;min-height:100vh}
#sidebar{width:210px;min-width:210px;background:var(--black);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
#main{flex:1;padding:24px 28px;overflow-y:auto;min-height:100vh}
.logo-area{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-box{width:34px;height:34px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:16px;flex-shrink:0}
.logo-name{font-weight:900;font-size:13px;color:#fff}
.logo-sub{font-size:9px;color:var(--gray4);letter-spacing:1px;text-transform:uppercase}
nav{padding:14px 10px;display:flex;flex-direction:column;gap:2px;flex:1}
.nav-section{font-size:9px;font-weight:800;color:#333;letter-spacing:1.2px;text-transform:uppercase;padding:10px 11px 4px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:7px;border:none;background:transparent;color:var(--gray4);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;width:100%}
.nav-btn.active{background:rgba(192,17,43,.2);color:var(--red)}
.nav-btn:hover:not(.active){background:rgba(255,255,255,.05);color:#ccc}
.sidebar-foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);font-size:10px;color:#444;letter-spacing:.5px}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.topbar h1{font-size:20px;font-weight:900;color:var(--black)}
.topbar-sub{font-size:11px;color:var(--gray4);margin-top:2px}
.btn{padding:8px 18px;border-radius:7px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s}
.btn:hover{opacity:.82}
.btn-primary{background:var(--red);color:#fff}
.btn-secondary{background:#fff;color:var(--gray7);border:1.5px solid var(--gray2)}
.btn-ghost{background:transparent;color:var(--gray7);border:none}
.btn-danger{background:#fff;color:var(--red);border:1.5px solid var(--red)}
.btn-green{background:#166534;color:#fff}
.btn-sm{padding:5px 12px;font-size:11px}
.badge{padding:2px 9px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;display:inline-block;white-space:nowrap}
.badge-green{background:#DCFCE7;color:#166534}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-yellow{background:#FEF9C3;color:#92400E}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
.badge-gray{background:var(--gray1);color:var(--gray7)}
.avatar{border-radius:50%;background:linear-gradient(135deg,var(--red) 0%,var(--red-dark) 100%);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:16px 18px}
.stat-card.accent{border-left:4px solid var(--red)}
.stat-val{font-size:28px;font-weight:900;line-height:1;color:var(--black)}
.stat-card.accent .stat-val{color:var(--red)}
.stat-label{font-size:11px;font-weight:700;color:var(--gray7);margin-top:4px}
.alert-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.alert-box{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:16px}
.alert-title{font-weight:800;font-size:13px;color:var(--black);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.alert-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--gray1)}
.alert-row:last-child{border-bottom:none}
.card{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:16px 18px}
.emp-list{display:flex;flex-direction:column;gap:9px}
.emp-card{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:13px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border .15s,box-shadow .15s}
.emp-card:hover{border-color:var(--red);box-shadow:0 2px 14px rgba(192,17,43,.1)}
.emp-name{font-weight:800;font-size:14px;color:var(--black)}
.emp-sub{font-size:11px;color:var(--gray4);margin-top:1px}
.emp-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.search-bar{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-bar input,.search-bar select{padding:8px 11px;border:1.5px solid var(--gray2);border-radius:7px;font-family:inherit;font-size:12px;color:var(--black);background:#fff;outline:none}
.search-bar input{flex:1;min-width:180px}
.hero-card{background:linear-gradient(135deg,#111 0%,#1C1C1C 100%);border-radius:13px;padding:22px 26px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:16px}
.hero-name{font-size:20px;font-weight:900;color:#fff;line-height:1.1}
.hero-sub{font-size:12px;color:var(--gray4);margin-top:3px}
.hero-badges{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.section-box{background:#fff;border:1.5px solid var(--gray2);border-radius:11px;padding:16px 18px}
.section-title{font-size:10px;font-weight:800;color:var(--red);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--gray1);padding-bottom:7px;margin-bottom:10px}
.data-row{display:grid;grid-template-columns:130px 1fr;gap:6px;align-items:start;margin-bottom:7px}
.data-label{font-size:11px;color:var(--gray4);font-weight:600}
.data-val{font-size:12px;color:var(--black);font-weight:600;word-break:break-all}
.doc-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.doc-chip{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}
.doc-ok{background:#DCFCE7;color:#166534;border:1px solid #BBF7D0}
.doc-no{background:var(--red-light);color:var(--red);border:1px solid #FECACA}
.alert-banner{background:#FFFBEB;border:1.5px solid #FDE68A;border-radius:9px;padding:11px 15px;display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:#92400E}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;z-index:100;overflow-y:auto;padding:32px 12px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:720px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-lg{max-width:820px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-size:17px;font-weight:900;color:var(--black)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray4);line-height:1;padding:2px 6px}
.form-section{margin-bottom:18px}
.form-section-title{font-size:10px;font-weight:800;color:var(--red);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--gray1)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:10px;font-weight:800;color:var(--gray7);letter-spacing:.4px;text-transform:uppercase}
.field input,.field select,.field textarea{padding:9px 12px;border:1.5px solid var(--gray2);border-radius:7px;font-family:inherit;font-size:13px;color:var(--black);background:#fff;outline:none;width:100%;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--red)}
.field textarea{resize:vertical;min-height:70px}
.doc-toggle{padding:6px 13px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;transition:all .1s;border:1.5px solid}
.doc-toggle.checked{background:#DCFCE7;color:#166534;border-color:#BBF7D0}
.doc-toggle.unchecked{background:var(--gray1);color:var(--gray7);border-color:var(--gray2)}
.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--gray2)}
.empty{text-align:center;padding:40px;color:var(--gray4);font-size:13px}
.count-note{font-size:11px;color:var(--gray4);margin-bottom:10px}
/* Steps */
.steps{display:flex;gap:0;margin-bottom:24px;background:#fff;border:1.5px solid var(--gray2);border-radius:11px;overflow:hidden}
.step{flex:1;padding:14px 10px;text-align:center;border-right:1px solid var(--gray2);cursor:pointer;transition:background .15s}
.step:last-child{border-right:none}
.step.active{background:var(--red);color:#fff}
.step.done{background:#DCFCE7;color:#166534}
.step-num{font-size:18px;font-weight:900;line-height:1}
.step-lbl{font-size:10px;font-weight:700;margin-top:3px;opacity:.8;text-transform:uppercase;letter-spacing:.5px}
/* Photo upload */
.photo-zone{border:2.5px dashed var(--gray2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .15s;background:#fafafa}
.photo-zone:hover{border-color:var(--red);background:var(--red-light)}
.photo-preview{width:90px;height:90px;border-radius:10px;object-fit:cover;margin:0 auto 8px;display:block;border:2px solid var(--gray2)}
/* Credential */
.cred-wrap{display:flex;justify-content:center;padding:10px 0}
.credential-card{width:320px;background:linear-gradient(145deg,#0f0f0f 0%,#1a0008 55%,#220010 100%);border-radius:16px;padding:22px 20px 18px;color:#fff;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.45)}
.credential-card::before{content:'';position:absolute;top:-40px;right:-40px;width:130px;height:130px;background:var(--red);border-radius:50%;opacity:.12}
.credential-card::after{content:'';position:absolute;bottom:-25px;left:-25px;width:90px;height:90px;background:var(--red);border-radius:50%;opacity:.08}
.cred-logo{display:flex;align-items:center;gap:8px;margin-bottom:18px;position:relative;z-index:1}
.cred-logo-box{width:30px;height:30px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px}
.cred-logo-name{font-weight:900;font-size:13px;letter-spacing:.5px}
.cred-logo-sub{font-size:8px;color:var(--gray4);letter-spacing:1px;text-transform:uppercase}
.cred-body{display:flex;gap:14px;align-items:flex-start;position:relative;z-index:1;margin-bottom:16px}
.cred-photo{width:70px;height:70px;border-radius:10px;background:linear-gradient(135deg,var(--red),var(--red-dark));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden;border:2px solid rgba(255,255,255,.1)}
.cred-photo img{width:100%;height:100%;object-fit:cover}
.cred-info{flex:1}
.cred-name{font-size:14px;font-weight:900;line-height:1.2;margin-bottom:3px}
.cred-puesto{font-size:9px;color:#aaa;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.cred-divider{height:1px;background:rgba(255,255,255,.08);margin-bottom:12px;position:relative;z-index:1}
.cred-data{display:grid;grid-template-columns:1fr 1fr;gap:10px;position:relative;z-index:1}
.cred-data-item{}
.cred-data-label{color:#666;letter-spacing:.5px;text-transform:uppercase;font-size:8px;margin-bottom:2px}
.cred-data-val{font-weight:700;font-size:10px;color:#ddd}
.cred-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);position:relative;z-index:1}
.cred-id{font-size:8px;color:rgba(255,255,255,.2);font-weight:700;letter-spacing:1px}
.cred-stripe{width:40px;height:4px;background:var(--red);border-radius:2px;opacity:.6}
/* Contract */
.contract-preview{background:#fffef5;border:1.5px solid #E5E1C8;border-radius:10px;padding:24px 28px;font-size:12px;line-height:1.9;color:#333;max-height:380px;overflow-y:auto;white-space:pre-wrap;font-family:'Courier New',monospace}
.template-zone{border:2.5px dashed var(--gray2);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .15s}
.template-zone:hover{border-color:var(--red);background:var(--red-light)}
.template-loaded{background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:10px}
.var-chip{display:inline-block;background:#EDE9FE;color:#6D28D9;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;font-family:monospace;margin:2px}
/* Alta steps */
.alta-step-content{background:#fff;border:1.5px solid var(--gray2);border-radius:12px;padding:24px}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="logo-area">
      <div class="logo-box">R</div>
      <div>
        <div class="logo-name">ROANSA</div>
        <div class="logo-sub">RH · Expedientes</div>
      </div>
    </div>
    <nav>
      <div class="nav-section">General</div>
      <button class="nav-btn active" id="nav-dashboard" onclick="showView('dashboard')">📊 Panel</button>
      <button class="nav-btn" id="nav-list" onclick="showView('list')">👥 Empleados</button>
      <div class="nav-section">Herramientas</div>
      <button class="nav-btn" id="nav-alta" onclick="showView('alta')">➕ Dar de alta</button>
      <button class="nav-btn" id="nav-templates" onclick="showView('templates')">📄 Machotes</button>
    </nav>
    <div class="sidebar-foot" id="sidebar-count">Cargando…</div>
  </div>
  <div id="main">
    <div id="view-dashboard"></div>
    <div id="view-list" style="display:none"></div>
    <div id="view-detail" style="display:none"></div>
    <div id="view-alta" style="display:none"></div>
    <div id="view-templates" style="display:none"></div>
  </div>
</div>
<div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>

<script>
// ── CONSTANTES ────────────────────────────────────────────────────
const DOCS=["INE","CURP","RFC","NSS","Comprobante domicilio","Acta nacimiento","Contrato firmado","Carta de no antecedentes","Examen médico","Foto"];
const AREAS=["Operaciones","Monitoreo","Administración","Dirección","RH"];
const PUESTOS=["Guardia de Seguridad","Supervisor","Supervisora","Jefe de Área","Coordinador","Administrativo","Director General"];
const CONTRATOS=["Prueba","Prueba extensión","Tiempo Indeterminado"];
const MESES=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const MESES_CORTO=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];

// ── ESTADO ────────────────────────────────────────────────────────
let employees=[
  {id:1,nombre:"Oscar Medina",puesto:"Supervisor",area:"Operaciones",telefono:"55 1234 5678",email:"oscar.medina@roansa.mx",curp:"MEOO850312HDFDRX01",rfc:"MEOO850312AB1",nss:"12345678901",domicilio:"Av. Insurgentes Norte 1200, CDMX",fechaNacimiento:"1985-03-12",fechaIngreso:"2018-06-01",status:"Activo",contrato:"Tiempo Indeterminado",documentos:["INE","CURP","Comprobante domicilio","Contrato firmado"],notas:"Supervisor zona norte. Excelente desempeño.",foto:null},
  {id:2,nombre:"Enrique Huitron",puesto:"Supervisor",area:"Operaciones",telefono:"55 2345 6789",email:"enrique.huitron@roansa.mx",curp:"HUIE880715HDFTRN02",rfc:"HUIE880715CD2",nss:"23456789012",domicilio:"Calle Madero 45, Tlalnepantla",fechaNacimiento:"1988-07-15",fechaIngreso:"2019-02-15",status:"Activo",contrato:"Tiempo Indeterminado",documentos:["INE","CURP","Contrato firmado"],notas:"Supervisor zona sur.",foto:null},
  {id:3,nombre:"Julieta Rodriguez",puesto:"Supervisora",area:"Monitoreo",telefono:"55 3456 7890",email:"julieta.rodriguez@roansa.mx",curp:"ROJU920220MDFDRX03",rfc:"ROJU920220EF3",nss:"34567890123",domicilio:"Blvd. Manuel Ávila Camacho 88, Naucalpan",fechaNacimiento:"1992-02-20",fechaIngreso:"2020-09-01",status:"Activo",contrato:"Tiempo Indeterminado",documentos:["INE","CURP","Comprobante domicilio","Contrato firmado","Acta nacimiento"],notas:"Responsable del Centro de Monitoreo.",foto:null},
];
let currentView='dashboard', selectedId=null, editingId=null;
let searchQ='', filterArea='', filterStatus='';
let contractTemplate='';
let altaStep=1, altaData={foto:null,documentos:[],empresa:'ROANSA'};

// ── UTILS ─────────────────────────────────────────────────────────
const calcAge=d=>{if(!d)return null;const t=new Date(),b=new Date(d);let a=t.getFullYear()-b.getFullYear();const m=t.getMonth()-b.getMonth();if(m<0||(m===0&&t.getDate()<b.getDate()))a--;return a;};
const calcYears=d=>{if(!d)return null;const t=new Date(),s=new Date(d);let y=t.getFullYear()-s.getFullYear();const m=t.getMonth()-s.getMonth();if(m<0||(m===0&&t.getDate()<s.getDate()))y--;return y;};
const daysUntil=d=>{if(!d)return null;const today=new Date();today.setHours(0,0,0,0);const dt=new Date(d);const next=new Date(today.getFullYear(),dt.getMonth(),dt.getDate());if(next<today)next.setFullYear(today.getFullYear()+1);return Math.ceil((next-today)/864e5);};
const fmtDate=d=>{if(!d)return'—';const[y,m,dd]=d.split('-');return`${parseInt(dd)} ${MESES_CORTO[parseInt(m)-1]} ${y}`;};
const fmtDateLong=d=>{if(!d)return'—';const[y,m,dd]=d.split('-');return`${parseInt(dd)} de ${MESES[parseInt(m)-1]} de ${y}`;};
const todayStr=()=>new Date().toISOString().split('T')[0];
const initials=n=>n.split(' ').slice(0,2).map(x=>x[0]).join('').toUpperCase();
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const gv=id=>{const el=document.getElementById(id);return el?el.value.trim():'';};
const docFalt=e=>DOCS.filter(d=>!e.documentos.includes(d));

function av(name,sz,foto){
  sz=sz||42;
  if(foto)return`<div class="avatar" style="width:${sz}px;height:${sz}px;overflow:hidden;border-radius:50%"><img src="${foto}" style="width:100%;height:100%;object-fit:cover"></div>`;
  return`<div class="avatar" style="width:${sz}px;height:${sz}px;font-size:${Math.round(sz*.36)}px">${initials(name)}</div>`;
}
function bdg(text,color){return`<span class="badge badge-${color||'gray'}">${text}</span>`;}

// ── NAVEGACIÓN ────────────────────────────────────────────────────
function showView(v,id){
  currentView=v;
  if(id!=null)selectedId=id;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nk=v==='detail'?'list':v;
  const nb=document.getElementById('nav-'+nk);
  if(nb)nb.classList.add('active');
  ['dashboard','list','detail','alta','templates'].forEach(x=>{document.getElementById('view-'+x).style.display='none';});
  document.getElementById('view-'+v).style.display='block';
  ({dashboard:renderDashboard,list:renderList,detail:renderDetail,alta:renderAlta,templates:renderTemplates}[v]||function(){})();
  updateSidebar();
}
function updateSidebar(){
  const n=employees.filter(e=>e.status==='Activo').length;
  document.getElementById('sidebar-count').textContent=`${n} empleado${n!==1?'s':''} activo${n!==1?'s':''}`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────
function renderDashboard(){
  const activos=employees.filter(e=>e.status==='Activo').length;
  const cumples=employees.map(e=>({...e,dias:daysUntil(e.fechaNacimiento)})).filter(e=>e.dias!==null&&e.dias<=30).sort((a,b)=>a.dias-b.dias);
  const anivs=employees.map(e=>({...e,dias:daysUntil(e.fechaIngreso),anos:calcYears(e.fechaIngreso)})).filter(e=>e.dias!==null&&e.dias<=30).sort((a,b)=>a.dias-b.dias);
  const incompletos=employees.filter(e=>docFalt(e).length>0);

  let h=`<div class="topbar"><div><h1>Panel de RH</h1><div class="topbar-sub">Resumen general · ROANSA Seguridad Privada</div></div><button class="btn btn-primary" onclick="showView('alta')">➕ Dar de alta</button></div>`;
  h+=`<div class="stat-grid">
    <div class="stat-card accent"><div class="stat-val">${employees.length}</div><div class="stat-label">Total empleados</div></div>
    <div class="stat-card"><div class="stat-val">${activos}</div><div class="stat-label">Activos</div></div>
    <div class="stat-card"><div class="stat-val">${incompletos.length}</div><div class="stat-label">Docs incompletos</div></div>
    <div class="stat-card"><div class="stat-val">${cumples.length+anivs.length}</div><div class="stat-label">Alertas este mes</div></div>
  </div>`;
  h+=`<div class="alert-grid">
    <div class="alert-box"><div class="alert-title">🎂 Próximos cumpleaños ${bdg(cumples.length,'yellow')}</div>

// ── LISTA ─────────────────────────────────────────────────────────
function renderList(){

      &&(!filterArea||e.area===filterArea)&&(!filterStatus||e.status===filterStatus)&&(!femp||e.empresa===femp);
  });
  let h=`<div class="topbar"><div><h1>Directorio de Empleados</h1><div class="topbar-sub">${employees.length} empleados en total</div></div><button class="btn btn-primary" onclick="showView('alta')">➕ Dar de alta</button></div>`;
  h+=`<div class="search-bar"><input placeholder="Buscar nombre, puesto, correo…" value="${esc(searchQ)}" oninput="searchQ=this.value;renderList()"><select id="filter-empresa" onchange="renderList()"><option value="">Todas las empresas</option><option value="ROANSA">ROANSA</option><option value="SPG">SPG</option></select><select onchange="filterArea=this.value;renderList()"><option value="">Todas las áreas</option>${AREAS.map(a=>`<option value="${a}"${filterArea===a?' selected':''}>${a}</option>`).join('')}</select><select onchange="filterStatus=this.value;renderList()"><option value="">Todos</option>${['Activo','Inactivo','Baja'].map(s=>`<option value="${s}"${filterStatus===s?' selected':''}>${s}</option>`).join('')}</select></div>`;
  h+=`<div class="count-note">${filtered.length} empleado${filtered.length!==1?'s':''} encontrado${filtered.length!==1?'s':''}</div><div class="emp-list">`;
  if(!filtered.length)h+=`<div class="empty">No se encontraron empleados.</div>`;
  filtered.forEach(e=>{
    const anos=calcYears(e.fechaIngreso),cd=daysUntil(e.fechaNacimiento),ad=daysUntil(e.fechaIngreso),df=docFalt(e).length;
    h+=`<div class="emp-card" onclick="showView('detail',${e.id})">${av(e.nombre,44,e.foto)}<div style="flex:1;min-width:0"><div class="emp-name">${esc(e.nombre)}</div><div class="emp-sub">${esc(e.puesto)} · ${esc(e.area)}</div></div><div class="emp-badges">${bdg(e.status,e.status==='Activo'?'green':'gray')}${anos>0?bdg(anos+' año'+(anos!==1?'s':''),'blue'):''}${cd!==null&&cd<=7?bdg('🎂 Pronto','yellow'):''}${ad!==null&&ad<=7?bdg('🏅 Aniv.','blue'):''}${df>0?bdg('⚠️ '+df+' doc','red'):''}</div></div>`;
  });
  h+=`</div>`;
  document.getElementById('view-list').innerHTML=h;
}

// ── ALTA (3 PASOS) ────────────────────────────────────────────────
function renderAlta(){
  const steps=[
    {n:1,icon:'👤',lbl:'Datos'},
    {n:2,icon:'📋',lbl:'Documentos'},
    {n:3,icon:'🪪',lbl:'Generar'},
  ];
  let h=`<div class="topbar"><div><h1>Dar de alta</h1><div class="topbar-sub">Nuevo empleado · 3 pasos</div></div></div>`;
  h+=`<div class="steps">`;
  steps.forEach(s=>{
    const cls=altaStep===s.n?'active':altaStep>s.n?'done':'';
    h+=`<div class="step ${cls}" onclick="if(${s.n}<altaStep)altaStep=${s.n},renderAlta()"><div class="step-num">${altaStep>s.n?'✓':s.icon}</div><div class="step-lbl">Paso ${s.n} · ${s.lbl}</div></div>`;
  });
  h+=`</div><div id="alta-content">`;
  if(altaStep===1)h+=renderAltaStep1();
  if(altaStep===2)h+=renderAltaStep2();
  if(altaStep===3)h+=renderAltaStep3();
  h+=`</div>`;
  document.getElementById('view-alta').innerHTML=h;
}

function handleFotoAlta(event){
  const file=event.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{altaData.foto=e.target.result;renderAlta();};
  reader.readAsDataURL(file);
}

function toggleAltaDoc(btn,doc){
  const c=btn.classList.contains('checked');
  btn.classList.toggle('checked',!c);btn.classList.toggle('unchecked',c);
  btn.textContent=(c?'○':'✓')+' '+doc;
}

function altaGuardarPaso1(){
  const nombre=gv('a-nombre');
  if(!nombre){alert('El nombre es requerido.');return;}
  const puesto=gv('a-puesto'),area=gv('a-area'),ing=gv('a-ing');
  if(!puesto||!area){alert('El puesto y área son requeridos.');return;}
  if(!ing){alert('La fecha de ingreso es requerida.');return;}
  altaData={...altaData,nombre,puesto,area,
    fechaNacimiento:gv('a-nac'),curp:gv('a-curp'),rfc:gv('a-rfc'),nss:gv('a-nss'),
    telefono:gv('a-tel'),email:gv('a-email'),domicilio:gv('a-dom'),
    fechaIngreso:ing,contrato:gv('a-contrato')||'Tiempo Indeterminado',
    status:gv('a-status')||'Activo',notas:gv('a-notas')};
  altaStep=2;renderAlta();
}

function altaGuardarPaso2(){
  const docs=[...document.querySelectorAll('#alta-doc-btns .doc-toggle.checked')].map(b=>b.dataset.doc);
  altaData.documentos=docs;
  const newEmp={...altaData,id:Date.now(),documentos:docs};
  delete newEmp._saved;
  employees.push(newEmp);
  altaData._saved=newEmp;
  updateSidebar();
  altaStep=3;renderAlta();
}

function resetAlta(){altaStep=1;altaData={foto:null,documentos:[]};}

  <div class="cred-data">

    <div class="cred-data-item"><div class="cred-data-label">Antigüedad</div><div class="cred-data-val">${anos!==null?(anos>0?anos+' año'+(anos!==1?'s':''):'< 1 año'):'—'}</div></div>
    <div class="cred-data-item"><div class="cred-data-label">NSS</div><div class="cred-data-val">${esc(e.nss)||'—'}</div></div>

function showCredentialModal(id){
  const e=employees.find(x=>x.id===id);
  if(!e)return;
  document.getElementById('modal-inner').innerHTML=`
  <div class="modal-header"><div class="modal-title">🪪 Credencial — ${esc(e.nombre)}</div><button class="modal-close" onclick="closeModal()">✕</button></div>
  <div class="cred-wrap">${buildCredHTML(e)}</div>
  <div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Cerrar</button><button class="btn btn-primary" onclick="printCredential(${id})">🖨 Imprimir</button></div>`;
  document.getElementById('modal').style.display='flex';
}

function printCredential(id){
  const e=employees.find(x=>x.id===id);
  if(!e)return;
  const fotoEl=e.foto?`<img src="${e.foto}" style="width:100%;height:100%;object-fit:cover">`:`<span style="font-size:22px;font-weight:900">${initials(e.nombre)}</span>`;

// ── CONTRATO ──────────────────────────────────────────────────────
function generateContract(id){
  const e=employees.find(x=>x.id===id);
  if(!e||!contractTemplate){alert('No hay machote cargado. Ve a la sección Machotes.');return;}
  const filled=contractTemplate
    .replace(/\{\{nombre\}\}/g,e.nombre||'')
    .replace(/\{\{curp\}\}/g,e.curp||'')
    .replace(/\{\{rfc\}\}/g,e.rfc||'')
    .replace(/\{\{nss\}\}/g,e.nss||'')
    .replace(/\{\{puesto\}\}/g,e.puesto||'')
    .replace(/\{\{area\}\}/g,e.area||'')
    .replace(/\{\{contrato\}\}/g,e.contrato||'')
    .replace(/\{\{fecha_ingreso\}\}/g,fmtDateLong(e.fechaIngreso))
    .replace(/\{\{domicilio\}\}/g,e.domicilio||'')
    .replace(/\{\{telefono\}\}/g,e.telefono||'')
    .replace(/\{\{email\}\}/g,e.email||'');
  const blob=new Blob([filled],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='Contrato_'+e.nombre.replace(/\s+/g,'_')+'.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── MACHOTES ──────────────────────────────────────────────────────

    <div style="display:flex;gap:10px"><div style="width:26px;height:26px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:900;flex-shrink:0">2</div><div><div style="font-weight:700;font-size:12px;margin-bottom:3px">Reemplaza los datos del trabajador</div><div style="font-size:11px;color:var(--gray4);margin-bottom:6px">Donde va el nombre, escribe <span class="var-chip">{{nombre}}</span>. Donde va la CURP, escribe <span class="var-chip">{{curp}}</span>, y así.</div><div style="display:flex;flex-wrap:wrap;gap:4px">${vars.map(v=>`<span class="var-chip">{{${v}}}</span>`).join('')}</div></div></div>
    <div style="display:flex;gap:10px"><div style="width:26px;height:26px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:900;flex-shrink:0">3</div><div><div style="font-weight:700;font-size:12px;margin-bottom:3px">Guarda como .txt</div><div style="font-size:11px;color:var(--gray4)">En Word: Archivo → Guardar como → Texto sin formato (.txt)</div></div></div>
    <div style="display:flex;gap:10px"><div style="width:26px;height:26px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:900;flex-shrink:0">4</div><div><div style="font-weight:700;font-size:12px;margin-bottom:3px">Súbelo aquí</div><div style="font-size:11px;color:var(--gray4)">Desde ahí en adelante, al dar de alta un empleado o en su ficha, aparece el botón "Generar contrato" que descarga el contrato ya lleno.</div></div></div>
  </div>
  </div></div>`;
  h+=`</div>`;
  document.getElementById('view-templates').innerHTML=h;

async function handleContractFile(e){
  const file=e.target.files[0];
  if(!file)return;
  contractTemplate=await file.text();
  renderTemplates();
}
async function handleContractDrop(e){
  e.preventDefault();
  const file=e.dataTransfer.files[0];
  if(!file)return;
  contractTemplate=await file.text();
  renderTemplates();
}

function toggleDoc(btn,doc){const c=btn.classList.contains('checked');btn.classList.toggle('checked',!c);btn.classList.toggle('unchecked',c);btn.textContent=(c?'○':'✓')+' '+doc;}

function saveEdit(){
  const nombre=gv('f-nombre');
  if(!nombre){alert('El nombre es requerido.');return;}
  const docs=[...document.querySelectorAll('#doc-btns .doc-toggle.checked')].map(b=>b.dataset.doc);
  const i=employees.findIndex(e=>e.id===editingId);
  if(i>-1){
    employees[i]={...employees[i],nombre,empresa:gv('f-empresa')||'ROANSA',puesto:gv('f-puesto'),area:gv('f-area'),
      telefono:gv('f-tel'),email:gv('f-email'),curp:gv('f-curp'),rfc:gv('f-rfc'),
      nss:gv('f-nss'),domicilio:gv('f-dom'),fechaNacimiento:gv('f-nac'),
      fechaIngreso:gv('f-ing'),status:gv('f-status'),contrato:gv('f-contrato'),
      notas:gv('f-notas'),documentos:docs};
  }
  closeModal();
  renderDetail();
  updateSidebar();
}

function deleteEmp(id){
  const e=employees.find(x=>x.id===id);
  if(!confirm(`¿Eliminar el expediente de ${e.nombre}?\nEsta acción no se puede deshacer.`))return;
  employees=employees.filter(x=>x.id!==id);
  showView('list');
}

function closeModal(){document.getElementById('modal').style.display='none';}
